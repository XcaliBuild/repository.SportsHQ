<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NovaPOS Ultra V3</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* Thème par défaut BLEU */
            --brand-blue: #0066FF; --bg-page: #F5F7FA; --surface-white: #FFFFFF;
            --text-dark: #111827; --text-gray: #6B7280; --border-light: #E5E7EB;
            --danger: #EF4444; --success: #10B981; --warning: #F59E0B; --purple: #8B5CF6;
            --radius-xl: 24px; --radius-btn: 14px; --shadow-soft: 0 8px 30px rgba(0, 0, 0, 0.06);
        }
        [data-theme="dark"] {
            --bg-page: #0F172A; --surface-white: #1E293B; --text-dark: #F1F5F9;
            --text-gray: #94A3B8; --border-light: #334155; --shadow-soft: 0 8px 30px rgba(0, 0, 0, 0.3);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; user-select: none; transition: background 0.3s, color 0.3s; }
        body { background-color: var(--bg-page); color: var(--text-dark); min-height: 100vh; padding-bottom: 20px; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: var(--surface-white); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border-light); }
       .brand { display: flex; align-items: center; gap: 10px; font-size: 1.1rem; font-weight: 800; color: var(--brand-blue); }
       .badge-connected { display: flex; align-items: center; gap: 6px; background: var(--bg-page); padding: 6px 12px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; }
       .badge-connected.us { width: 20px; height: 20px; border-radius: 50%; background: var(--brand-blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }
       .icon-btn { background: var(--bg-page); border: none; color: var(--text-gray); width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

       .app-container { padding: 16px; max-width: 500px; margin: 0 auto; }

       .terminal-screen { background: var(--brand-blue); color: white; padding: 25px 20px; text-align: center; border-radius: var(--radius-xl); box-shadow: var(--shadow-soft); margin-bottom: 16px; position: relative; overflow: hidden; transition: background 0.4s; }
       .terminal-deco { position: absolute; opacity: 0.1; font-size: 4rem; }
       .deco-left { left: 10px; top: 20px; }
       .deco-right { right: 10px; top: 20px; }
       .total-label { font-size: 0.9rem; font-weight: 600; opacity: 0.9; margin-bottom: 4px; }
       .total-display { font-size: 3.2rem; font-weight: 800; }
       .barcode-display { margin: 16px auto 0; background: rgba(255,255,255,0.18); padding: 10px 20px; border-radius: 50px; font-family: monospace; font-size: 1.1rem; min-height: 40px; display: inline-block; min-width: 180px; }
       .color-dots { display: flex; gap: 14px; margin-top: 20px; justify-content: center; }
       .dot { width: 16px; height: 16px; border-radius: 50%; cursor: pointer; position: relative; border: 2px solid rgba(255,255,255,0.3); }
       .dot.active { transform: scale(1.3); border-color: white; }
       .dot-1 { background-color: #4285F4; }.dot-2 { background-color: #FBBC05; }
       .dot-3 { background-color: #34A853; }.dot-4 { background-color: #EA4335; }
       .dot-5 { background-color: #A855F7; }.dot-6 { background-color: #EC4899; }
       .dot-label { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); font-size: 0.55rem; opacity: 0.9; white-space: nowrap; }

       .btn-add-product { width: 100%; padding: 16px; background: var(--success); color: white; border: none; border-radius: var(--radius-btn); font-size: 1rem; font-weight: 700; margin-bottom: 16px; }

       .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
       .num-btn { background: var(--surface-white); border: 1px solid var(--border-light); color: var(--text-dark); height: 65px; border-radius: var(--radius-btn); font-size: 1.8rem; font-weight: 600; cursor: pointer; }
       .num-btn:active { transform: scale(0.96); }
       .btn-enter { background: var(--brand-blue); color: white; border: none; }
       .btn-clear { color: var(--danger); }
        
       .btn-checkout { width: 100%; background: var(--text-dark); color: var(--surface-white); border: none; padding: 18px; border-radius: var(--radius-btn); font-size: 1.1rem; font-weight: 800; margin-bottom: 12px; }
       .btn-paymentlink { width: 100%; background: var(--brand-blue); color: white; border: none; padding: 16px; border-radius: var(--radius-btn); font-size: 1rem; font-weight: 700; }

       .modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; z-index: 100; transition: 0.2s; }
       .modal-backdrop.active { opacity: 1; pointer-events: auto; }
       .modal-content { background: var(--surface-white); border-radius: var(--radius-xl); padding: 24px; width: 92%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
       .modal-header { display: flex; justify-content: space-between; margin-bottom: 18px; font-weight: 800; font-size: 1.1rem; }
       .form-group { margin-bottom: 14px; }
       .form-group label { display: block; font-size: 0.85rem; color: var(--text-gray); font-weight: 600; margin-bottom: 6px; }
       .form-control { width: 100%; padding: 12px; background: var(--bg-page); border: 1px solid var(--border-light); border-radius: var(--radius-btn); font-size: 1rem; color: var(--text-dark); }
       .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
       .btn-modal { flex: 1; padding: 14px; border-radius: var(--radius-btn); border: none; font-weight: 700; cursor: pointer; }
       .btn-save { background: var(--brand-blue); color: white; }
       .btn-cancel { background: var(--bg-page); color: var(--text-dark); }

       .product-list-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border-light); }
    </style>
</head>
<body data-theme="light">

    <header>
        <div class="brand"><i class="fa-solid fa-credit-card"></i><span>NovaPOS Ultra</span></div>
        <div style="display:flex; gap:8px;">
            <button class="icon-btn" onclick="toggleTheme()"><i class="fa-solid fa-moon" id="theme-icon"></i></button>
            <button class="icon-btn" onclick="openModal('products-modal')"><i class="fa-solid fa-box"></i></button>
            <button class="icon-btn" onclick="openModal('settings-modal')"><i class="fa-solid fa-gear"></i></button>
        </div>
    </header>

    <div class="app-container">
        <div class="terminal-screen" id="terminal-screen">
            <i class="fa-solid fa-bolt terminal-deco deco-left"></i>
            <i class="fa-solid fa-wifi terminal-deco deco-right"></i>
            <div class="total-label">MONTANT TOTAL</div>
            <div class="total-display" id="cart-total">0.00 €</div>
            <div class="barcode-display" id="barcode-display">Saisie...</div>
            <div class="color-dots">
                <div class="dot dot-1" onclick="setScreenMode(1)"><span class="dot-label">Vente</span></div>
                <div class="dot dot-2" onclick="setScreenMode(2)"><span class="dot-label">Remise</span></div>
                <div class="dot dot-3" onclick="setScreenMode(3)"><span class="dot-label">Rapide</span></div>
                <div class="dot dot-4" onclick="setScreenMode(4)"><span class="dot-label">Annuler</span></div>
                <div class="dot dot-5" onclick="setScreenMode(5)"><span class="dot-label">Paiement</span></div>
                <div class="dot dot-6" onclick="setScreenMode(6)"><span class="dot-label">Produits</span></div>
            </div>
        </div>

        <button class="btn-add-product" onclick="openAddProductModal()">+ Ajouter un produit</button>

        <div class="numpad-grid">
            <button class="num-btn" onclick="typeNum('7')">7</button><button class="num-btn" onclick="typeNum('8')">8</button><button class="num-btn" onclick="typeNum('9')">9</button>
            <button class="num-btn" onclick="typeNum('4')">4</button><button class="num-btn" onclick="typeNum('5')">5</button><button class="num-btn" onclick="typeNum('6')">6</button>
            <button class="num-btn" onclick="typeNum('1')">1</button><button class="num-btn" onclick="typeNum('2')">2</button><button class="num-btn" onclick="typeNum('3')">3</button>
            <button class="num-btn btn-clear" onclick="backspaceNum()"><i class="fa-solid fa-delete-left"></i></button>
            <button class="num-btn" onclick="typeNum('0')">0</button>
            <button class="num-btn btn-enter" onclick="submitBarcode()"><i class="fa-solid fa-check"></i></button>
        </div>

        <button class="btn-checkout" onclick="openCheckoutModal()">ENCAISSER</button>
        <button class="btn-paymentlink" onclick="openPaymentLinkModal()"><i class="fa-solid fa-link"></i> DEMANDER UN PAIEMENT</button>
    </div>

    <!-- MODALES -->
    <div class="modal-backdrop" id="settings-modal"><div class="modal-content"><div class="modal-header"><span>Configuration</span><i class="fa-solid fa-xmark" onclick="closeModal('settings-modal')"></i></div>
        <div class="form-group"><label>Nom Entreprise</label><input id="comp-name" class="form-control"></div>
        <div class="form-group"><label>TVA %</label><input id="comp-tva" type="number" class="form-control"></div>
        <div class="form-group"><label>Devise</label><select id="comp-currency" class="form-control"></select></div>
        <div class="modal-actions"><button class="btn-modal btn-cancel" onclick="closeModal('settings-modal')">Annuler</button><button class="btn-modal btn-save" onclick="saveSettings()">Sauver</button></div>
    </div></div>

    <div class="modal-backdrop" id="products-modal"><div class="modal-content"><div class="modal-header"><span>Produits enregistrés</span><i class="fa-solid fa-xmark" onclick="closeModal('products-modal')"></i></div><div id="products-list"></div></div></div>
    
    <div class="modal-backdrop" id="add-product-modal"><div class="modal-content"><div class="modal-header"><span>Nouveau Produit</span><i class="fa-solid fa-xmark" onclick="closeModal('add-product-modal')"></i></div><div class="form-group"><label>Code Barre</label><input id="prod-barcode" class="form-control"></div><div class="form-group"><label>Nom</label><input id="prod-name" class="form-control"></div><div class="form-group"><label>Prix</label><input id="prod-price" type="number" step="0.01" class="form-control"></div><div class="modal-actions"><button class="btn-modal btn-cancel" onclick="closeModal('add-product-modal')">Annuler</button><button class="btn-modal btn-save" onclick="saveProduct()">Ajouter</button></div></div></div>
    
    <div class="modal-backdrop" id="checkout-modal"><div class="modal-content"><div class="modal-header"><span>Encaissement</span><i class="fa-solid fa-xmark" onclick="closeModal('checkout-modal')"></i></div><div id="receipt-preview" style="background:var(--bg-page); padding:15px; border-radius:12px; font-family:monospace; font-size:0.85rem; margin-bottom:15px;"></div><div class="form-group"><label>Email/Tel Client</label><input id="client-contact" class="form-control"></div><div class="modal-actions"><button class="btn-modal btn-save" onclick="sendReceipt()">Envoyer Ticket</button></div></div></div>
    
    <div class="modal-backdrop" id="paymentlink-modal"><div class="modal-content"><div class="modal-header"><span>Lien de Paiement</span><i class="fa-solid fa-xmark" onclick="closeModal('paymentlink-modal')"></i></div><div class="form-group"><label>Montant</label><input id="payment-amount" type="number" step="0.01" class="form-control"></div><div class="form-group"><label>Envoyer à</label><input id="payment-contact" placeholder="06... ou email" class="form-control"></div><div style="background:var(--bg-page); padding:12px; border-radius:12px; font-size:0.85rem; word-break:break-all; margin-bottom:15px;" id="generated-link"></div><div class="modal-actions"><button class="btn-modal" style="background:#25D366; color:white" onclick="sendPaymentLink('whatsapp')">WhatsApp</button><button class="btn-modal btn-save" onclick="sendPaymentLink('sms')">SMS</button></div></div></div>

    <script>
        let currentInput = ""; let cart = []; let currentMode = 1;
        let dbProducts = JSON.parse(localStorage.getItem('novaultra_products')) || {'123456':{name:'Coca 33cl', price:'2.50'}, '789012':{name:'Pain', price:'1.20'}};
        let companySettings = JSON.parse(localStorage.getItem('novaultra_settings')) || {name:"NovaPOS", tva:"20", currency:"EUR"};

        const CURRENCIES = {
            "EUR":"€ Euro","USD":"$ Dollar US","GBP":"£ Livre","JPY":"¥ Yen","CAD":"$ Dollar CA","AUD":"$ Dollar AU","CHF":"Fr Franc CH",
            "CNY":"¥ Yuan","INR":"₹ Roupie","BRL":"R$ Real","RUB":"₽ Rouble","KRW":"₩ Won","MXN":"$ Peso MX","SGD":"$ Dollar SG",
            "HKD":"$ Dollar HK","NZD":"$ Dollar NZ","TRY":"₺ Livre TR","ZAR":"R Rand","SEK":"kr Couronne","NOK":"kr Couronne NO",
            "DKK":"kr Couronne DK","PLN":"zł Zloty","THB":"฿ Baht","IDR":"Rp Roupie ID","HUF":"Ft Forint","CZK":"Kč Couronne CZ",
            "ILS":"₪ Shekel","CLP":"$ Peso CL","PHP":"₱ Peso PH","AED":"د.إ Dirham","COP":"$ Peso CO","SAR":"﷼ Riyal","MYR":"RM Ringgit",
            "RON":"lei Leu","MAD":"د.م Dirham MA","NGN":"₦ Naira","BDT":"৳ Taka","PKR":"₨ Roupie PK","VND":"₫ Dong","UAH":"₴ Hryvnia"
        };

        function setScreenMode(mode){
            currentMode = mode;
            document.querySelectorAll('.dot').forEach(d=>d.classList.remove('active'));
            document.querySelector(`.dot-${mode}`).classList.add('active');
            
            const colors = {1:'#0066FF', 2:'#F59E0B', 3:'#10B981', 4:'#EF4444', 5:'#8B5CF6', 6:'#EC4899'};
            document.getElementById('terminal-screen').style.background = colors[mode];
            document.querySelector('.btn-paymentlink').style.background = colors[mode];
            document.querySelector('.btn-enter').style.background = colors[mode];
            document.documentElement.style.setProperty('--brand-blue', colors[mode]);

            if(mode === 6) openModal('products-modal');
            if(mode === 4) clearCart();
            if(mode === 5) openPaymentLinkModal();
        }

        function toggleTheme(){
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            if(body.dataset.theme === 'light'){ body.dataset.theme = 'dark'; icon.className = 'fa-solid fa-sun'; }
            else { body.dataset.theme = 'light'; icon.className = 'fa-solid fa-moon'; }
        }

        function loadCurrencies(){
            const select = document.getElementById('comp-currency');
            for(const [code, name] of Object.entries(CURRENCIES)){
                select.innerHTML += `<option value="${code}">${name}</option>`;
            }
            select.value = companySettings.currency;
        }

        function getCurrencySymbol(){ return CURRENCIES[companySettings.currency].split(' ')[0]; }

        function typeNum(num) { currentInput += num; document.getElementById('barcode-display').innerText = currentInput; }
        function backspaceNum() { currentInput = currentInput.slice(0, -1); document.getElementById('barcode-display').innerText = currentInput || "Saisie..."; }
        function submitBarcode() {
            if(!currentInput) return;
            if(currentMode === 2){ applyDiscount(currentInput); } // Remise
            else {
                const p = dbProducts[currentInput];
                if(p){ cart.push({...p, code:currentInput}); renderCart(); }
                else{ document.getElementById('prod-barcode').value=currentInput; openModal('add-product-modal'); }
            }
            currentInput=""; document.getElementById('barcode-display').innerText="Saisie...";
        }
        function renderCart(){ let total=cart.reduce((s,i)=>s+parseFloat(i.price),0); document.getElementById('cart-total').innerText=total.toFixed(2)+" "+getCurrencySymbol(); }
        
        function applyDiscount(code){ const p=dbProducts[code]; if(p) { p.price = (p.price*0.9).toFixed(2); alert(`-10% sur ${p.name}`); } else alert("Produit non trouvé"); }
        function addQuickProduct(){ const p=prompt("Prix produit rapide?"); if(p) {cart.push({name:"Produit Rapide", price:p, code:"RAPIDE"}); renderCart();} }
        function clearCart(){ if(confirm("Vider le panier?")){cart=[]; renderCart();} }

        function openModal(id){document.getElementById(id).classList.add('active'); if(id==='products-modal') loadProductsList();}
        function closeModal(id){document.getElementById(id).classList.remove('active')}
        
        function loadProductsList(){
            const list = document.getElementById('products-list'); list.innerHTML = "";
            for(const [code, p] of Object.entries(dbProducts)){
                list.innerHTML += `<div class="product-list-item"><span>${p.name} <small style="color:var(--text-gray)">#${code}</small></span><span>${p.price} ${getCurrencySymbol()}</span></div>`;
            }
        }

        function openAddProductModal(code=""){document.getElementById('prod-barcode').value=code||Date.now().toString().slice(-6); openModal('add-product-modal')}
        function saveProduct(){const c=prod-barcode.value,n=prod-name.value,p=prod-price.value; if(c&&n&&p){dbProducts[c]={name:n,price:p}; localStorage.setItem('novaultra_products',JSON.stringify(dbProducts)); closeModal('add-product-modal');}}
        function saveSettings(){companySettings={name:comp-name.value,tva:comp-tva.value,currency:comp-currency.value}; localStorage.setItem('novaultra_settings',JSON.stringify(companySettings)); closeModal('settings-modal'); renderCart();}
        
        function openCheckoutModal(){ if(!cart.length) return alert("Panier vide"); let html=`<b>${companySettings.name}</b><br>`; cart.forEach(i=>html+=`${i.name}...${i.price}${getCurrencySymbol()}<br>`); html+=`<b>Total: ${document.getElementById('cart-total').innerText}</b>`; document.getElementById('receipt-preview').innerHTML=html; openModal('checkout-modal');}
        function sendReceipt(){alert("Ticket envoyé"); cart=[]; renderCart(); closeModal('checkout-modal');}
        
        function openPaymentLinkModal(){document.getElementById('payment-amount').value=parseFloat(document.getElementById('cart-total').innerText)||''; generateLink(); openModal('paymentlink-modal')}
        function generateLink(){const a=payment-amount.value; document.getElementById('generated-link').innerText=`https://novapos.link/pay/${Math.random().toString(36).slice(2,7)}?amount=${a}&cur=${companySettings.currency}`}
        function sendPaymentLink(m){const l=generated-link.innerText,c=payment-contact.value; window.open(`https://wa.me/${c}?text=${encodeURIComponent(l)}`); closeModal('paymentlink-modal')}

        // INIT
        loadCurrencies();
        document.getElementById('comp-name').value=companySettings.name; 
        document.getElementById('comp-tva').value=companySettings.tva;
        setScreenMode(1); // Mode vente par défaut
    </script>
</body>
</html>
