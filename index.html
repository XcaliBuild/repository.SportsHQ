<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NovaPOS Ultra Swipe</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #0066FF; --brand-yellow: #F59E0B; --brand-green: #10B981; --brand-red: #EF4444; --brand-purple: #8B5CF6;
            --bg-page: #F5F7FA; --surface-white: #FFFFFF; --text-dark: #111827; --text-gray: #6B7280; --border-light: #E5E7EB;
            --radius-xl: 24px; --radius-btn: 14px; --shadow-soft: 0 8px 30px rgba(0, 0, 0, 0.06);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; user-select: none; }
        body { background-color: var(--bg-page); color: var(--text-dark); min-height: 100vh; overflow-x: hidden; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: var(--surface-white); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border-light); }
      .brand { display: flex; align-items: center; gap: 10px; font-size: 1.1rem; font-weight: 800; color: var(--brand-blue); }
      .page-indicator { display: flex; gap: 8px; }
      .page-dot { width: 8px; height: 8px; border-radius: 50%; background: #D1D5DB; transition: 0.3s; }
      .page-dot.active { width: 20px; border-radius: 10px; background: var(--brand-blue); }
      .icon-btn { background: var(--bg-page); border: none; color: var(--text-gray); width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

      .swipe-container { display: flex; width: 500%; transition: transform 0.3s ease-out; }
      .screen { width: 20%; padding: 16px; max-width: 500px; margin: 0 auto; flex-shrink: 0; }

      .terminal-screen { color: white; padding: 25px 20px; text-align: center; border-radius: var(--radius-xl); box-shadow: var(--shadow-soft); margin-bottom: 16px; }
      .screen-0.terminal-screen { background: var(--brand-blue); }
      .screen-1.terminal-screen { background: var(--brand-yellow); }
      .screen-2.terminal-screen { background: var(--brand-green); }
      .screen-3.terminal-screen { background: var(--brand-red); }
      .screen-4.terminal-screen { background: var(--brand-purple); }

      .total-label { font-size: 0.9rem; font-weight: 600; opacity: 0.9; }
      .total-display { font-size: 3rem; font-weight: 800; margin: 5px 0 15px; }
      .input-box { background: rgba(255,255,255,0.2); padding: 12px; border-radius: 12px; font-size: 1.1rem; margin-bottom: 10px; }

      .btn { width: 100%; padding: 16px; border: none; border-radius: var(--radius-btn); font-size: 1rem; font-weight: 700; margin-bottom: 12px; cursor: pointer; }
      .btn-primary { background: var(--text-dark); color: white; }
      .btn-secondary { background: var(--surface-white); color: var(--text-dark); border: 1px solid var(--border-light); }

      .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
      .num-btn { background: var(--surface-white); border: 1px solid var(--border-light); color: var(--text-dark); height: 65px; border-radius: var(--radius-btn); font-size: 1.8rem; font-weight: 600; }
      .num-btn:active { transform: scale(0.96); }
      .btn-enter { background: var(--brand-blue); color: white; }

      .form-group { margin-bottom: 14px; text-align: left; }
      .form-group label { display: block; font-size: 0.85rem; color: white; font-weight: 600; margin-bottom: 6px; opacity: 0.9; }
      .form-control { width: 100%; padding: 12px; background: rgba(255,255,255,0.2); border: none; border-radius: var(--radius-btn); font-size: 1rem; color: white; }
      .form-control::placeholder { color: rgba(255,255,255,0.7); }

      .product-list-item { display: flex; justify-content: space-between; padding: 14px; background: var(--surface-white); border-radius: 12px; margin-bottom: 10px; }

      .modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; z-index: 100; transition: 0.2s; }
      .modal-backdrop.active { opacity: 1; pointer-events: auto; }
      .modal-content { background: var(--surface-white); border-radius: var(--radius-xl); padding: 24px; width: 92%; max-width: 400px; }
      .modal-header { display: flex; justify-content: space-between; margin-bottom: 18px; font-weight: 800; font-size: 1.1rem; }
    </style>
</head>
<body>

    <header>
        <div class="brand"><i class="fa-solid fa-credit-card"></i><span>NovaPOS</span></div>
        <div class="page-indicator">
            <div class="page-dot active"></div><div class="page-dot"></div><div class="page-dot"></div><div class="page-dot"></div><div class="page-dot"></div>
        </div>
        <button class="icon-btn" onclick="openModal('settings-modal')"><i class="fa-solid fa-gear"></i></button>
    </header>

    <div class="swipe-container" id="swipe-container">

        <!-- ECRAN 0 BLEU : VENTE -->
        <div class="screen screen-0">
            <div class="terminal-screen">
                <div class="total-label">VENTE</div>
                <div class="total-display" id="cart-total">0.00 €</div>
                <div class="input-box" id="barcode-display">Saisie...</div>
            </div>
            <button class="btn btn-secondary" onclick="openAddProductModal()">+ Ajouter un produit</button>
            <div class="numpad-grid">
                <button class="num-btn" onclick="typeNum('7')">7</button><button class="num-btn" onclick="typeNum('8')">8</button><button class="num-btn" onclick="typeNum('9')">9</button>
                <button class="num-btn" onclick="typeNum('4')">4</button><button class="num-btn" onclick="typeNum('5')">5</button><button class="num-btn" onclick="typeNum('6')">6</button>
                <button class="num-btn" onclick="typeNum('1')">1</button><button class="num-btn" onclick="typeNum('2')">2</button><button class="num-btn" onclick="typeNum('3')">3</button>
                <button class="num-btn" onclick="backspaceNum()"><i class="fa-solid fa-delete-left"></i></button><button class="num-btn" onclick="typeNum('0')">0</button>
                <button class="num-btn btn-enter" onclick="submitBarcode()"><i class="fa-solid fa-check"></i></button>
            </div>
            <button class="btn btn-primary" onclick="openCheckoutModal()">ENCAISSER</button>
        </div>

        <!-- ECRAN 1 JAUNE : REMISE -->
        <div class="screen screen-1">
            <div class="terminal-screen">
                <div class="total-label">REMISE</div>
                <div class="total-display" id="discount-total">0.00 €</div>
            </div>
            <div class="form-group"><label>Montant à remettre</label><input id="discount-amount" type="number" class="form-control" placeholder="0.00"></div>
            <div style="display:grid; grid-template-columns: repeat(3,1fr); gap:10px; margin-bottom:15px;">
                <button class="btn btn-secondary" onclick="setDiscount(5)">-5%</button>
                <button class="btn btn-secondary" onclick="setDiscount(10)">-10%</button>
                <button class="btn btn-secondary" onclick="setDiscount(20)">-20%</button>
            </div>
            <div class="form-group"><label>Commentaire</label><input id="discount-comment" class="form-control" placeholder="Raison de la remise..."></div>
            <button class="btn btn-primary" onclick="applyDiscount()">APPLIQUER LA REMISE</button>
        </div>

        <!-- ECRAN 2 VERT : PAIEMENT ECHELONNE -->
        <div class="screen screen-2">
            <div class="terminal-screen">
                <div class="total-label">PAIEMENT EN PLUSIEURS FOIS</div>
                <div class="total-display" id="split-total">0.00 €</div>
            </div>
            <div class="form-group"><label>Nom Client</label><input id="client-name" class="form-control" placeholder="Jean Dupont"></div>
            <div class="form-group"><label>Téléphone</label><input id="client-phone" class="form-control" placeholder="06 12 34 56 78"></div>
            <div class="form-group"><label>Email</label><input id="client-email" class="form-control" placeholder="email@ex.com"></div>
            <div class="form-group"><label>Adresse</label><input id="client-address" class="form-control" placeholder="12 Rue de Paris"></div>
            <div class="form-group"><label>Nombre d'échéances</label><input id="split-count" type="number" value="3" class="form-control"></div>
            <button class="btn btn-primary" onclick="createSplitPayment()">GÉNÉRER LES ÉCHÉANCES</button>
        </div>

        <!-- ECRAN 3 ROUGE : GESTION PRODUITS -->
        <div class="screen screen-3">
            <div class="terminal-screen">
                <div class="total-label">GESTION PRODUITS</div>
                <div class="total-display" style="font-size:1.5rem"><i class="fa-solid fa-box"></i> <span id="product-count">0</span> Articles</div>
            </div>
            <button class="btn btn-secondary" onclick="openAddProductModal()">+ Ajouter / Modifier Produit</button>
            <div id="products-list" style="max-height: 400px; overflow-y: auto;"></div>
        </div>

        <!-- ECRAN 4 VIOLET : SCAN -->
        <div class="screen screen-4">
            <div class="terminal-screen">
                <div class="total-label">SCAN QR & CODE BARRE</div>
                <div class="total-display" style="font-size:1.2rem">Caméra</div>
            </div>
            <div id="camera-view" style="background:black; height:300px; border-radius:16px; display:flex; align-items:center; justify-content:center; color:white; margin-bottom:15px;">
                <i class="fa-solid fa-camera" style="font-size:3rem; opacity:0.5"></i>
            </div>
            <button class="btn btn-primary" onclick="startScan()"><i class="fa-solid fa-qrcode"></i> LANCER LE SCAN</button>
            <button class="btn btn-secondary" onclick="openAddProductModal()">Saisie Manuelle</button>
        </div>

    </div>

    <!-- Modales -->
    <div class="modal-backdrop" id="settings-modal"><div class="modal-content"><div class="modal-header"><span>Configuration</span><i class="fa-solid fa-xmark" onclick="closeModal('settings-modal')"></i></div><div class="form-group"><label>Devise</label><select id="comp-currency" class="form-control"></select></div><button class="btn btn-primary" onclick="saveSettings()">Sauver</button></div></div>
    <div class="modal-backdrop" id="add-product-modal"><div class="modal-content"><div class="modal-header"><span>Produit</span><i class="fa-solid fa-xmark" onclick="closeModal('add-product-modal')"></i></div><div class="form-group"><label>Code Barre</label><input id="prod-barcode" class="form-control"></div><div class="form-group"><label>Nom</label><input id="prod-name" class="form-control"></div><div class="form-group"><label>Prix</label><input id="prod-price" type="number" step="0.01" class="form-control"></div><button class="btn btn-primary" onclick="saveProduct()">Enregistrer</button></div></div>
    <div class="modal-backdrop" id="checkout-modal"><div class="modal-content"><div class="modal-header"><span>Encaissement</span><i class="fa-solid fa-xmark" onclick="closeModal('checkout-modal')"></i></div><div id="receipt-preview"></div><button class="btn btn-primary" onclick="sendReceipt()">Valider</button></div></div>

    <script>
        let currentScreen = 0; let startX = 0;
        let cart = []; let dbProducts = JSON.parse(localStorage.getItem('novaultra_products')) || {'123456':{name:'Coca', price:'2.50'}};
        let companySettings = JSON.parse(localStorage.getItem('novaultra_settings')) || {currency:"EUR"};
        const CURRENCIES = {"EUR":"€","USD":"$","GBP":"£","JPY":"¥","MAD":"DH","CAD":"$","CHF":"Fr","CNY":"¥","INR":"₹","BRL":"R$"};

        // SWIPE
        document.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.addEventListener('touchend', e => {
            let endX = e.changedTouches[0].clientX;
            if(startX - endX > 50 && currentScreen < 4) currentScreen++;
            if(endX - startX > 50 && currentScreen > 0) currentScreen--;
            updateScreen();
        });

        function updateScreen(){
            document.getElementById('swipe-container').style.transform = `translateX(-${currentScreen * 20}%)`;
            document.querySelectorAll('.page-dot').forEach((d,i)=>d.classList.toggle('active', i===currentScreen));
            const colors = ['#0066FF','#F59E0B','#10B981','#EF4444','#8B5CF6'];
            document.querySelector('.page-dot.active').style.background = colors[currentScreen];
            if(currentScreen === 3) loadProductsList();
            if(currentScreen === 1) document.getElementById('discount-total').innerText = document.getElementById('cart-total').innerText;
            if(currentScreen === 2) document.getElementById('split-total').innerText = document.getElementById('cart-total').innerText;
        }

        function typeNum(num) { currentInput += num; document.getElementById('barcode-display').innerText = currentInput; }
        let currentInput = "";
        function backspaceNum() { currentInput = currentInput.slice(0, -1); document.getElementById('barcode-display').innerText = currentInput || "Saisie..."; }
        function submitBarcode() {
            const p = dbProducts[currentInput];
            if(p){ cart.push({...p}); renderCart(); } else { document.getElementById('prod-barcode').value=currentInput; openModal('add-product-modal'); }
            currentInput=""; document.getElementById('barcode-display').innerText="Saisie...";
        }
        function renderCart(){ let total=cart.reduce((s,i)=>s+parseFloat(i.price),0); document.getElementById('cart-total').innerText=total.toFixed(2)+" "+CURRENCIES[companySettings.currency]; }

        // ECRAN JAUNE
        function setDiscount(p){ document.getElementById('discount-amount').value = (parseFloat(document.getElementById('cart-total').innerText) * p / 100).toFixed(2); }
        function applyDiscount(){ alert("Remise de "+document.getElementById('discount-amount').value+" appliquée. Motif: "+document.getElementById('discount-comment').value); }

        // ECRAN VERT
        function createSplitPayment(){
            const total = parseFloat(document.getElementById('cart-total').innerText);
            const count = document.getElementById('split-count').value;
            alert(`${count} échéances de ${(total/count).toFixed(2)}€ créées pour ${document.getElementById('client-name').value}`);
        }

        // ECRAN ROUGE
        function loadProductsList(){
            const list = document.getElementById('products-list'); list.innerHTML = "";
            document.getElementById('product-count').innerText = Object.keys(dbProducts).length;
            for(const [code, p] of Object.entries(dbProducts)){
                list.innerHTML += `<div class="product-list-item" onclick="editProduct('${code}')"><span>${p.name}<br><small>#${code}</small></span><span>${p.price} ${CURRENCIES[companySettings.currency]}</span></div>`;
            }
        }
        function editProduct(code){ document.getElementById('prod-barcode').value=code; document.getElementById('prod-name').value=dbProducts[code].name; document.getElementById('prod-price').value=dbProducts[code].price; openModal('add-product-modal'); }

        // ECRAN VIOLET
        function startScan(){ alert("Accès caméra... Ici on brancherait html5-qrcode pour scanner"); }

        function openModal(id){document.getElementById(id).classList.add('active')}
        function closeModal(id){document.getElementById(id).classList.remove('active')}
        function openAddProductModal(code=""){document.getElementById('prod-barcode').value=code; openModal('add-product-modal')}
        function saveProduct(){const c=prod-barcode.value,n=prod-name.value,p=prod-price.value; if(c&&n&&p){dbProducts[c]={name:n,price:p}; localStorage.setItem('novaultra_products',JSON.stringify(dbProducts)); closeModal('add-product-modal'); loadProductsList();}}
        function saveSettings(){companySettings.currency=comp-currency.value; localStorage.setItem('novaultra_settings',JSON.stringify(companySettings)); closeModal('settings-modal'); renderCart();}
        function openCheckoutModal(){document.getElementById('receipt-preview').innerText="Total: "+document.getElementById('cart-total').innerText; openModal('checkout-modal')}
        function sendReceipt(){cart=[]; renderCart(); closeModal('checkout-modal'); alert("Vente validée")}

        // INIT
        for(const [code, sym] of Object.entries(CURRENCIES)) document.getElementById('comp-currency').innerHTML += `<option value="${code}">${code} ${sym}</option>`;
        document.getElementById('comp-currency').value = companySettings.currency;
    </script>
</body>
</html>
