<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NovaPOS 2026 • Professional Edition</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0f172a; /* Slate 900 */
            --bg-surface: #1e293b; /* Slate 800 */
            --bg-surface-light: #334155; /* Slate 700 */
            --accent: #0ea5e9; /* Sky Blue */
            --accent-hover: #0284c7; 
            --accent-glow: 0 0 15px rgba(14, 165, 233, 0.3);
            --success: #10B981;
            --danger: #EF4444;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --border: rgba(255, 255, 255, 0.1);
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header Compact */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
        }

        .brand {
            display: flex; align-items: center; gap: 10px;
            font-size: 1.1rem; font-weight: 700;
        }
        .brand i { color: var(--accent); }

        .header-actions { display: flex; gap: 10px; align-items: center; }

        .btn-google {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 6px 14px;
            border-radius: 50px;
            cursor: pointer; font-size: 0.85rem; font-weight: 600;
        }
        .btn-google img { width: 16px; }

        .icon-btn {
            background: var(--bg-surface-light);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        /* Layout Principal */
        .app-container {
            display: flex; flex: 1; padding: 10px; gap: 10px;
            overflow: hidden;
        }

        /* Panier */
        .cart-area {
            flex: 1.2;
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        .cart-header {
            padding: 15px; font-weight: 600; font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between;
        }

        .cart-list {
            flex: 1; overflow-y: auto; padding: 10px;
        }

        .cart-item {
            background: var(--bg-surface-light);
            border-radius: var(--radius-md);
            padding: 12px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .item-info h4 { font-size: 0.95rem; margin-bottom: 2px; }
        .item-info p { color: var(--text-muted); font-size: 0.75rem; }
        .item-price { font-weight: bold; color: var(--accent); }

        .cart-footer {
            padding: 15px; background: var(--bg-surface-light);
            border-top: 1px solid var(--border);
        }

        .total-display {
            font-size: 2rem; font-weight: 800; text-align: right; margin-bottom: 10px;
        }

        .btn-checkout {
            width: 100%; background: var(--accent); color: white;
            border: none; padding: 14px; border-radius: 50px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
        }

        /* Clavier Numérique (Numpad) */
        .numpad-area {
            flex: 0.8;
            display: flex; flex-direction: column; gap: 10px;
        }

        .barcode-display {
            background: var(--bg-surface);
            border: 1px solid var(--border); border-radius: var(--radius-lg);
            padding: 15px; text-align: center; font-size: 1.2rem;
            font-family: monospace; letter-spacing: 2px; color: var(--accent);
            min-height: 50px; display: flex; align-items: center; justify-content: center;
        }

        .numpad-grid {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            padding: 15px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            flex: 1; align-items: center; justify-items: center;
        }

        .num-btn {
            width: 100%; max-width: 70px; height: 60px;
            border-radius: 12px;
            background: var(--bg-surface-light);
            border: 1px solid var(--border);
            color: var(--text-main);
            font-size: 1.5rem; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .num-btn:active { background: var(--accent); transform: scale(0.95); }

        .btn-action-add {
            grid-column: span 3; width: 100%; max-width: none;
            height: 45px; border-radius: 20px; font-size: 1rem;
            background: rgba(14, 165, 233, 0.1); color: var(--accent);
            border-color: rgba(14, 165, 233, 0.3);
        }
        
        .btn-enter { background: var(--accent); color: white; border-color: var(--accent); }
        .btn-clear { color: var(--danger); font-size: 1.2rem; }

        /* Modales */
        .modal-backdrop {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; z-index: 100;
        }
        .modal-backdrop.active { opacity: 1; pointer-events: auto; }
        
        .modal-content {
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 20px;
            width: 95%; max-width: 400px; max-height: 90vh; overflow-y: auto;
        }

        .modal-header { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; }
        
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; }
        .form-control {
            width: 100%; padding: 10px; background: var(--bg-base);
            border: 1px solid var(--border); border-radius: 8px; color: white; outline: none;
        }

        .modal-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-modal { flex: 1; padding: 10px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }
        .btn-cancel { background: var(--bg-surface-light); color: white; }
        .btn-save { background: var(--accent); color: white; }

        .receipt-preview {
            background: white; color: black; padding: 15px; border-radius: 8px;
            font-family: monospace; font-size: 0.8rem; margin-bottom: 15px;
            max-height: 150px; overflow-y: auto; text-align: center;
        }

        /* Mobile Scroll Fix */
        @media (max-width: 768px) {
            body { height: auto; min-height: 100vh; overflow-y: auto; }
            .app-container { flex-direction: column; overflow: visible; }
            .numpad-area { order: -1; }
            .cart-area { min-height: 400px; }
            .numpad-grid { padding: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <i class="fa-solid fa-cube"></i>
            <span>NovaPOS</span>
        </div>
        <div class="header-actions">
            <button class="btn-google" onclick="mockGoogleLogin()" id="google-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G">
                <span>Login with Google Account</span>
            </button>
            <button class="icon-btn" onclick="openModal('settings-modal')"><i class="fa-solid fa-gear"></i></button>
        </div>
    </header>

    <div class="app-container">
        <div class="cart-area">
            <div class="cart-header">
                <span>Ticket en cours</span>
                <span id="cart-count">0 article</span>
            </div>
            <div class="cart-list" id="cart-list"></div>
            <div class="cart-footer">
                <div class="total-display" id="cart-total">0.00 €</div>
                <button class="btn-checkout" onclick="openCheckoutModal()">ENCAISSER</button>
            </div>
        </div>

        <div class="numpad-area">
            <div class="barcode-display" id="barcode-display">...</div>
            
            <div class="numpad-grid">
                <button class="num-btn btn-action-add" onclick="openAddProductModal()">+ Ajouter</button>
                
                <button class="num-btn" onclick="typeNum('7')">7</button>
                <button class="num-btn" onclick="typeNum('8')">8</button>
                <button class="num-btn" onclick="typeNum('9')">9</button>
                
                <button class="num-btn" onclick="typeNum('4')">4</button>
                <button class="num-btn" onclick="typeNum('5')">5</button>
                <button class="num-btn" onclick="typeNum('6')">6</button>
                
                <button class="num-btn" onclick="typeNum('1')">1</button>
                <button class="num-btn" onclick="typeNum('2')">2</button>
                <button class="num-btn" onclick="typeNum('3')">3</button>
                
                <button class="num-btn btn-clear" onclick="backspaceNum()"><i class="fa-solid fa-delete-left"></i></button>
                <button class="num-btn" onclick="typeNum('0')">0</button>
                <button class="num-btn btn-enter" onclick="submitBarcode()"><i class="fa-solid fa-arrow-turn-down fa-rotate-90"></i></button>
            </div>
        </div>
    </div>

    <div class="modal-backdrop" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Paramètres Entreprise</span>
                <i class="fa-solid fa-xmark" style="cursor:pointer;" onclick="closeModal('settings-modal')"></i>
            </div>
            <div class="form-group"><label>Nom de l'entreprise</label><input type="text" class="form-control" id="comp-name"></div>
            <div class="form-group"><label>SIRET</label><input type="text" class="form-control" id="comp-siret"></div>
            <div class="form-group"><label>TVA (%)</label><input type="number" class="form-control" id="comp-tva"></div>
            <div class="form-group"><label>Adresse</label><input type="text" class="form-control" id="comp-address"></div>
            <div class="form-group"><label>Contact</label><input type="text" class="form-control" id="comp-contact"></div>
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" onclick="closeModal('settings-modal')">Fermer</button>
                <button class="btn-modal btn-save" onclick="saveSettings()">Sauvegarder</button>
            </div>
        </div>
    </div>

    <div class="modal-backdrop" id="add-product-modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Nouveau Produit</span>
                <i class="fa-solid fa-xmark" style="cursor:pointer;" onclick="closeModal('add-product-modal')"></i>
            </div>
            <div class="form-group"><label>Code Barre</label><input type="text" class="form-control" id="prod-barcode"></div>
            <div class="form-group"><label>Nom</label><input type="text" class="form-control" id="prod-name"></div>
            <div class="form-group"><label>Détails</label><input type="text" class="form-control" id="prod-specs"></div>
            <div class="form-group"><label>Prix (€)</label><input type="number" step="0.01" class="form-control" id="prod-price"></div>
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" onclick="closeModal('add-product-modal')">Annuler</button>
                <button class="btn-modal btn-save" onclick="saveProduct()">Sauvegarder</button>
            </div>
        </div>
    </div>

    <div class="modal-backdrop" id="checkout-modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Finaliser la vente</span>
                <i class="fa-solid fa-xmark" style="cursor:pointer;" onclick="closeModal('checkout-modal')"></i>
            </div>
            
            <div class="form-group">
                <label>Statut du paiement</label>
                <select class="form-control" id="pay-status" onchange="buildReceiptPreview()">
                    <option value="PAYÉ (Totalité)">Payé (Totalité)</option>
                    <option value="PAYÉ (Plusieurs fois)">Paiement en plusieurs fois</option>
                </select>
            </div>

            <div class="receipt-preview" id="receipt-preview"></div>

            <div class="form-group">
                <label>Contact client (Email / SMS)</label>
                <input type="text" class="form-control" id="client-contact" placeholder="Email ou Numéro">
            </div>

            <div class="modal-actions">
                <button class="btn-modal btn-cancel" onclick="sendReceipt('sms')" style="background: #F59E0B;"><i class="fa-solid fa-mobile-screen"></i> SMS</button>
                <button class="btn-modal btn-save" onclick="sendReceipt('email')"><i class="fa-solid fa-envelope"></i> Email</button>
            </div>
        </div>
    </div>

    <script>
        let currentInput = "";
        let cart = [];
        let dbProducts = JSON.parse(localStorage.getItem('nova2026_products')) || {};
        let companySettings = JSON.parse(localStorage.getItem('nova2026_settings')) || {
            name: "Ma Boutique", siret: "", tva: "20", address: "", contact: ""
        };

        function typeNum(num) {
            if (currentInput.length < 15) {
                currentInput += num;
                document.getElementById('barcode-display').innerText = currentInput;
            }
        }

        // --- BACKSPACE FIX ---
        function backspaceNum() {
            currentInput = currentInput.slice(0, -1);
            document.getElementById('barcode-display').innerText = currentInput || "...";
        }

        function submitBarcode() {
            if (!currentInput) return;
            const product = dbProducts[currentInput];
            if (product) {
                addToCart(currentInput, product);
                currentInput = "";
                document.getElementById('barcode-display').innerText = "...";
            } else {
                openAddProductModal(currentInput);
            }
        }

        function addToCart(code, product) {
            cart.push({ ...product, code });
            renderCart();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            list.innerHTML = "";
            let total = 0;

            cart.forEach((item, index) => {
                total += parseFloat(item.price);
                list.innerHTML += `
                    <div class="cart-item">
                        <div class="item-info">
                            <h4>${item.name}</h4>
                            <p>${item.specs ? item.specs + ' | ' : ''}Code: ${item.code}</p>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span class="item-price">${parseFloat(item.price).toFixed(2)} €</span>
                            <i class="fa-solid fa-xmark" style="color:var(--danger); cursor:pointer;" onclick="removeFromCart(${index})"></i>
                        </div>
                    </div>
                `;
            });

            document.getElementById('cart-total').innerText = total.toFixed(2) + " €";
            document.getElementById('cart-count').innerText = cart.length + " article(s)";
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function openAddProductModal(code = "") {
            document.getElementById('prod-barcode').value = code || currentInput || Math.floor(Math.random() * 1000000000).toString();
            document.getElementById('prod-name').value = "";
            document.getElementById('prod-specs').value = "";
            document.getElementById('prod-price').value = "";
            openModal('add-product-modal');
        }

        function saveProduct() {
            const code = document.getElementById('prod-barcode').value;
            const name = document.getElementById('prod-name').value;
            const specs = document.getElementById('prod-specs').value;
            const price = document.getElementById('prod-price').value;

            if (code && name && price) {
                dbProducts[code] = { name, specs, price };
                localStorage.setItem('nova2026_products', JSON.stringify(dbProducts));
                closeModal('add-product-modal');
                currentInput = "";
                document.getElementById('barcode-display').innerText = "...";
            }
        }

        function loadSettingsToForm() {
            document.getElementById('comp-name').value = companySettings.name;
            document.getElementById('comp-siret').value = companySettings.siret;
            document.getElementById('comp-tva').value = companySettings.tva;
            document.getElementById('comp-address').value = companySettings.address;
            document.getElementById('comp-contact').value = companySettings.contact;
        }

        function saveSettings() {
            companySettings = {
                name: document.getElementById('comp-name').value,
                siret: document.getElementById('comp-siret').value,
                tva: document.getElementById('comp-tva').value,
                address: document.getElementById('comp-address').value,
                contact: document.getElementById('comp-contact').value
            };
            localStorage.setItem('nova2026_settings', JSON.stringify(companySettings));
            closeModal('settings-modal');
        }

        // --- RECEIPT BUILDER (With payment status) ---
        function openCheckoutModal() {
            if (cart.length === 0) return;
            buildReceiptPreview();
            document.getElementById('client-contact').value = "";
            openModal('checkout-modal');
        }

        function buildReceiptPreview() {
            let totalHT = 0;
            const status = document.getElementById('pay-status').value;
            
            let html = `
                <div style="font-weight:bold; font-size:1.1rem;">${companySettings.name}</div>
                <div>${companySettings.address}</div>
                <div>SIRET: ${companySettings.siret || "N/A"} | ${companySettings.contact}</div>
                <hr style="margin:8px 0;">
            `;

            cart.forEach(item => {
                const p = parseFloat(item.price);
                totalHT += p;
                html += `<div style="display:flex; justify-content:space-between;"><span>${item.name}</span><span>${p.toFixed(2)} €</span></div>`;
            });

            const tvaRate = parseFloat(companySettings.tva) || 0;
            const tvaAmount = totalHT * (tvaRate / 100);
            const totalTTC = totalHT + tvaAmount;

            html += `
                <hr style="margin:8px 0;">
                <div style="display:flex; justify-content:space-between;"><span>Total HT</span><span>${totalHT.toFixed(2)} €</span></div>
                <div style="display:flex; justify-content:space-between;"><span>TVA (${tvaRate}%)</span><span>${tvaAmount.toFixed(2)} €</span></div>
                <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:1rem; margin-top:5px;"><span>NET À PAYER</span><span>${totalTTC.toFixed(2)} €</span></div>
                
                <div style="margin-top:10px; padding:5px; border:1px dashed black; font-weight:bold; text-transform:uppercase;">
                    *** ${status} ***
                </div>
            `;
            document.getElementById('receipt-preview').innerHTML = html;
        }

        function sendReceipt(method) {
            const contact = document.getElementById('client-contact').value;
            if (!contact) return alert("Entrez un contact.");
            alert(`Ticket envoyé par ${method} à ${contact}`);
            cart = [];
            renderCart();
            closeModal('checkout-modal');
        }

        function mockGoogleLogin() {
            const btn = document.getElementById('google-btn');
            btn.innerHTML = `<img src="https://ui-avatars.com/api/?name=User&background=0ea5e9&color=fff&rounded=true" style="width:16px;"> <span>Connecté</span>`;
            btn.style.borderColor = "var(--success)";
            btn.style.color = "var(--success)";
        }

        loadSettingsToForm();
    </script>
</body>
</html>
