<!DOCTYPE html>
<html lang="fr">
<head>
<script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writer. · The Pages. BD PRO (Fast Engine)</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Caveat+Brush&family=Comic+Neue:wght@400;700&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style id="customFontsStyle"></style>
<style>
    :root { --glass-bg: rgba(15,15,18,0.7); --glass-sheet: rgba(22,22,26,0.65); --border: rgba(255,255,255,0.08); --text: #f3f4f6; --muted: #8c8f9b; --accent: #22d3ee; }
    * { margin:0; padding:0; box-sizing:border-box; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent; }
    ::-webkit-scrollbar { width:8px; height:8px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:100px; border:2px solid transparent; background-clip:padding-box; }
    body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at 50% -20%, #1a1a24 0%, #050505 100%); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }
    .glass { background:var(--glass-bg); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); }
    .ribbon { height:68px; display:flex; justify-content:space-between; align-items:center; padding:0 20px; z-index:30; }
    .ribbon-group { display:flex; align-items:center; gap:10px; min-width:0; }
    .logo-txt { line-height:1; margin-right:15px; display:flex; align-items:baseline; flex-shrink:0; white-space:nowrap; }
    .logo-main { font-family:'Playfair Display',serif; font-size:26px; font-weight:700; color:#fff; }
    .logo-sub { font-size:9px; letter-spacing:4px; text-transform:uppercase; color:var(--accent); font-weight:600; margin-left:4px; transition: color 0.4s; }
    .sync { font-size:10px; color:var(--muted); text-transform:uppercase; display:flex; gap:6px; align-items:center; letter-spacing:1px; flex-shrink:0; }
    .btn { background: rgba(20,20,25,0.6); backdrop-filter: blur(12px); color: var(--text); border: 1px solid rgba(255,255,255,0.08); padding: 9px 16px; border-radius: 10px; font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px; outline: none; box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 4px 20px rgba(0,0,0,0.3); transition: all .2s ease; flex-shrink:0; }
    .btn:hover { background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.14); transform:translateY(-1px); }
    .btn-danger { color:#ef4444; border-color:rgba(239,68,68,0.2); }
    .main-body { display:flex; flex:1; overflow:hidden; }
    .sidebar { width:240px; background:rgba(10,10,12,0.4); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
    .sidebar-scroll { flex:1; overflow-y:auto; padding-top:10px; }
    .cat { font-size:10px; text-transform:uppercase; color:var(--muted); padding:16px 20px 8px; letter-spacing:1px; font-weight:600; }
    .menu-item { padding:10px 20px; color:var(--muted); font-size:13px; border-left:2px solid transparent; display:flex; align-items:center; gap:8px; cursor:pointer; transition:.2s; }
    .menu-item:hover { color:#fff; background:rgba(255,255,255,0.03); }
    .menu-item.active { color:#fff; background:rgba(255,255,255,0.06); border-left-color:var(--accent); font-weight:600; }
    .workspace { flex:1; padding:25px; overflow-y:auto; display:flex; justify-content:center; align-items:flex-start; position:relative; }
    .page-nav { position:absolute; top:50%; transform:translateY(-50%); width:44px; height:44px; border-radius:50%; background:rgba(20,20,25,0.8); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:15; backdrop-filter:blur(10px); transition:.2s; }
    .page-nav:hover { background:rgba(255,255,255,0.1); border-color:var(--accent); color:var(--accent); }
    .page-nav.left { left:20px; }
    .page-nav.right { right:20px; }
    .page-nav.disabled { opacity:.2; pointer-events:none; }
    .sheet { width:100%; max-width:840px; background:var(--glass-sheet); backdrop-filter:blur(25px); border:1px solid var(--border); border-radius:16px; padding:35px 45px; display:flex; flex-direction:column; gap:12px; min-height:65vh; box-shadow:0 30px 60px rgba(0,0,0,0.6); margin-bottom:50px; }
    .sheet.is-cover { justify-content:flex-end; padding-bottom:80px; text-align:center; }
    .input-group { display:flex; flex-direction:column; gap:6px; flex:1; min-width:140px; }
    .input-group label { font-size:10px; text-transform:uppercase; color:var(--muted); font-weight:600; display:flex; justify-content:space-between; }
    .text-input { background:transparent; border:none; border-bottom:1px solid rgba(255,255,255,0.15); color:inherit; font-size:24px; font-weight:600; padding:6px 0; outline:none; width:100%; transition:.2s; }
    .text-input:focus { border-bottom-color:var(--accent); }
    .meta-input { background:rgba(0,0,0,0.3); border:1px solid var(--border); color:inherit; font-size:13px; padding:10px 12px; border-radius:8px; outline:none; width:100%; transition:.2s; }
    .meta-input:focus { border-color:var(--accent); }
    .meta-row { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
    .segment-group { display:flex; background:rgba(0,0,0,0.4); border-radius:10px; padding:4px; border:1px solid var(--border); }
    .segment-btn { flex:1; background:transparent; color:var(--muted); border:none; padding:7px; border-radius:8px; font-size:11px; cursor:pointer; display:flex; justify-content:center; align-items:center; transition:.2s; }
    .segment-btn.active { background:rgba(255,255,255,0.1); color:#fff; font-weight:600; }
    textarea.main { width:100%; min-height:280px; background:transparent; border:none; color:inherit; font-size:16px; line-height:1.8; resize:vertical; outline:none; }
    input[type=range] { -webkit-appearance:none; width:100%; background:transparent; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; height:14px; width:14px; border-radius:50%; background:var(--accent); cursor:pointer; margin-top:-5px; }
    input[type=range]::-webkit-slider-runnable-track { width:100%; height:4px; cursor:pointer; background:rgba(255,255,255,0.15); border-radius:2px; }
    .btn-preview { position:fixed; bottom:30px; right:30px; background:rgba(20,20,25,0.8); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.08); color:var(--text); padding:14px 24px; border-radius:30px; font-size:14px; font-weight:500; cursor:pointer; z-index:30; display:flex; gap:10px; box-shadow:0 10px 30px rgba(0,0,0,0.5); transition:.2s; }
    
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.92); backdrop-filter:blur(15px); display:none; justify-content:center; align-items:center; z-index:1000; padding:0; }
    .overlay.active { display:flex; }
    .modal { background:#111114; border:1px solid var(--border); border-radius:16px; width:100%; max-width:600px; max-height:90vh; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 25px 50px rgba(0,0,0,0.8); }
    .modal-head { padding:18px 24px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.02); }
    .modal-body { padding:24px; overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:20px; }
    
    .preview-shell { display:flex; flex-direction:column; align-items:center; gap:10px; width:100%; height:100%; justify-content:flex-start; padding-top: 10px; }
    .preview-top { display:flex; gap:8px; background:rgba(20,20,25,0.8); border:1px solid rgba(255,255,255,0.08); padding:10px 14px; border-radius:40px; align-items:center; flex-wrap:wrap; backdrop-filter:blur(12px); flex-shrink: 0; z-index: 1010; }
    .preview-top .btn.active { background:rgba(255,255,255,0.15); color:var(--accent); border-color:var(--accent); font-weight:600; }
    .btn-close-round { background:transparent; border:none; color:var(--muted); font-size:22px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.2s; margin-left:6px; flex-shrink:0; padding:0; }
    .btn-close-round:hover { color:var(--accent); transform:scale(1.1); }
    
    .preview-screen { background:#faf8f5; border-radius:14px; overflow:auto; position:relative; box-shadow:0 20px 60px rgba(0,0,0,0.8); border:8px solid #222; transition:.3s ease; }
    .preview-screen.large { width:100%; height:calc(100vh - 70px); max-width:100%; border-width:0; border-radius:0; flex:1; }
    .prv-content { padding:40px; color:#111; font-size:16px; line-height:1.7; position:relative; min-height:100%; word-wrap:break-word; }
    
    .clearfix::after { content:""; clear:both; display:table; }
    .gen-wrap { position:relative; width:100%; }
    .gen-wrap .btn, .gen-wrap .meta-input { width:100%; justify-content:space-between; cursor:pointer; }
    .dropdown-menu { position:absolute; top:calc(100% + 8px); left:0; min-width:100%; background:rgba(18,18,22,0.98); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:8px; z-index:100; display:none; flex-direction:column; gap:4px; box-shadow:0 20px 40px rgba(0,0,0,0.6); max-height:320px; overflow-y:auto; }
    .dropdown-menu.right { left:auto; right:0; min-width:280px; }
    .dropdown-item { width:100%; justify-content:flex-start; background:transparent; border:none; padding:11px 14px; border-radius:8px; font-size:13px; color:var(--text); display:flex; gap:10px; cursor:pointer; align-items:center; text-align:left; transition:.2s; }
    .dropdown-item:hover { background:rgba(255,255,255,0.08); color:var(--accent); }
    .project-item { display:flex; justify-content:space-between; align-items:center; padding:14px; border:1px solid var(--border); border-radius:10px; background:rgba(255,255,255,0.02); transition:.2s; }
    .project-item.active { border-color:var(--accent); background:rgba(255,255,255,0.05); }
    .saved-toast { position:fixed; bottom:40px; left:50%; transform:translateX(-50%) translateY(100px); background:rgba(20,20,25,0.95); border:1px solid var(--accent); color:#fff; padding:10px 24px; border-radius:30px; z-index:3000; opacity:0; transition:.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display:flex; gap:10px; align-items:center; font-weight:500; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
    .saved-toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
    
    /* ===== BD PRO FAST ENGINE STYLES ===== */
    .bd-toolbar { background:rgba(18,18,22,0.98); border:1px solid var(--border); border-radius:12px; padding:14px; display:flex; flex-direction:column; gap:12px; }
    .bd-section-title { font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:1px; color:#fff; display:flex; align-items:center; gap:8px; }
    .bd-section-title i { color:var(--accent); }
    .bd-templates { display:flex; gap:8px; overflow-x:auto; padding:8px 0; scrollbar-width: thin; }
    .template-thumb { width:60px; height:84px; background:#0e0e10; border:2px solid var(--border); border-radius:8px; cursor:pointer; position:relative; overflow:hidden; flex-shrink:0; transition:.2s; }
    .template-thumb.active { border-color:#ef4444; box-shadow:0 0 0 2px rgba(239,68,68,0.3); }
    .bd-canvas-wrap { width:100%; max-width:620px; aspect-ratio:1/1.414; background:#fff; border:4px solid #111; margin:0 auto; position:relative; overflow:hidden; border-radius:4px; box-shadow:0 20px 50px rgba(0,0,0,0.5); }
    .bd-bg-layer { position:absolute; inset:0; overflow:hidden; z-index:0; background:#fff; }
    .bd-grid-container { position:absolute; inset:0; z-index:1; }
    .bd-panel { position:absolute; background:#fff; border:2.5px solid #111; overflow:hidden; cursor:grab; box-sizing:border-box; }
    .bd-panel.selected { border-color:#ef4444; box-shadow:inset 0 0 0 1px #ef4444, 0 0 0 2px rgba(239,68,68,0.4); z-index:3; }
    .bd-panel img { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; transform-origin:center center; pointer-events:none; will-change:transform; }
    .bd-panel-placeholder { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; color:#777; background:#f5f5f0; font-size:10px; text-transform:uppercase; font-weight:700; text-align:center; padding:10px; }
    
    /* ===== NEW FAST BUBBLE SYSTEM (No Filters, Vector Tails) ===== */
    .bd-bubble {
        position:absolute; min-width:14%; background:#fff; font-weight:700; color:#111; cursor:move; user-select:none; z-index:10; 
        line-height:1.15; display:flex; align-items:center; justify-content:center; text-align:center; box-sizing:border-box; 
        white-space:pre-wrap; overflow-wrap:break-word; padding:0.8em 1.2em; border:2.5px solid #111;
        /* Comic book harsh drop-shadow. ULTRA fast to render vs CSS filter */
        box-shadow: 4px 4px 0px rgba(17,17,17,1);
    }
    .bd-bubble.selected { outline:3px solid #ef4444; outline-offset:4px; z-index:15; }
    
    /* Pure Geometry for the bubble bodies */
    .shape-oval { border-radius: 50% / 50%; }
    .shape-round { border-radius: 50%; aspect-ratio: 1/1; }
    .shape-rect { border-radius: 8px; }
    .shape-capsule { border-radius: 999px; }
    .shape-cloud { border-radius: 42% 58% 55% 45% / 48% 42% 58% 52%; }
    
    /* For bursts, we remove the main border and box-shadow, and rely entirely on clip-path */
    .shape-burst {
        clip-path: polygon(50% 0%, 66% 10%, 86% 2%, 76% 26%, 100% 22%, 84% 42%, 100% 62%, 82% 72%, 96% 96%, 68% 84%, 50% 100%, 32% 84%, 4% 96%, 18% 72%, 0% 62%, 16% 42%, 0% 22%, 24% 26%, 14% 2%, 34% 10%);
        border: none; box-shadow: none; padding: 1.5em; background: #fff;
    }

    /* Palette UI */
    .bubble-palette { display:grid; grid-template-columns:repeat(auto-fill,minmax(78px,1fr)); gap:8px; max-height:200px; overflow-y:auto; padding:6px; background:rgba(0,0,0,0.2); border-radius:10px; border:1px solid var(--border); }
    .bubble-palette-item { background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:10px; padding:8px 4px 6px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px; transition:.2s; user-select:none; }
    .bubble-palette-item:hover, .bubble-palette-item.active { border-color:var(--accent); background:rgba(255,255,255,0.08); }
    .mini-bubble { width:52px; height:36px; background:#fff; border:2px solid #111; position:relative; display:flex; align-items:center; justify-content:center; box-sizing:border-box; flex-shrink:0; }
    .mini-bubble.oval { border-radius:50% / 50%; }
    .mini-bubble.round { border-radius:50%; width:38px; height:38px; }
    .mini-bubble.rect { border-radius:6px; }
    .mini-bubble.capsule { border-radius:999px; width:60px; }
    .mini-bubble.cloud { border-radius:42% 58% 55% 45% / 48% 42% 58% 52%; }
    .mini-bubble.burst { clip-path: polygon(50% 0%, 66% 10%, 86% 2%, 76% 26%, 100% 22%, 84% 42%, 100% 62%, 82% 72%, 96% 96%, 68% 84%, 50% 100%, 32% 84%, 4% 96%, 18% 72%, 0% 62%, 16% 42%, 0% 22%, 24% 26%, 14% 2%, 34% 10%); border:none; background:#fff; }
    
    .color-swatch { width:22px; height:22px; border-radius:4px; border:1px solid rgba(255,255,255,0.2); cursor:pointer; transition:0.2s; flex-shrink:0; }
    .color-swatch:hover { transform:scale(1.1); border-color:#fff; }
</style>
</head>
<body>
<div class="ribbon glass">
    <div class="ribbon-group">
        <div class="logo-txt"><div class="logo-main">The Pages.</div><div class="logo-sub">BD PRO</div></div>
        <div class="sync" id="syncIndicator"><i class="fas fa-check-circle"></i> sync</div>
        <button class="btn" onclick="openProjects()"><i class="fas fa-folder"></i> Projets</button>
        <div class="gen-wrap" style="width:200px;">
            <button class="btn" onclick="toggleDropdown('pageDropdown')"><span id="pageSelectLabel">Cover</span> <i class="fas fa-chevron-down" style="font-size:10px;opacity:0.6"></i></button>
            <div id="pageDropdown" class="dropdown-menu"></div>
        </div>
        <button class="btn" onclick="addPage()"><i class="fas fa-plus"></i></button>
        <button class="btn btn-danger" onclick="deletePage()"><i class="fas fa-trash"></i></button>
    </div>
    <div class="ribbon-group">
        <button class="btn" onclick="manualSave()"><i class="fas fa-save"></i> Save</button>
        <div class="gen-wrap" style="width:auto;">
            <button class="btn" onclick="toggleDropdown('generateDropdown')"><i class="fas fa-layer-group"></i> Create</button>
            <div id="generateDropdown" class="dropdown-menu right">
                <button class="dropdown-item" onclick="exportPagesData();closeMenus()">Fichier pages.data</button>
                <button class="dropdown-item" onclick="exportEPUB3();closeMenus()">Livre EPUB3</button>
            </div>
        </div>
    </div>
</div>

<div class="main-body">
    <div class="sidebar">
        <div class="sidebar-scroll">
            <div class="cat">Modules</div>
            <div class="menu-item active" onclick="activateModule('comic')"><i class="fas fa-layer-group"></i> Bande Dessinée</div>
        </div>
    </div>
    
    <div class="workspace" id="workspace">
        <div class="page-nav left" id="navLeft" onclick="prevPage()"><i class="fas fa-chevron-left"></i></div>
        <div class="page-nav right" id="navRight" onclick="nextPage()"><i class="fas fa-chevron-right"></i></div>
        
        <div class="sheet" id="sheet">
            <!-- Cover Settings -->
            <div class="input-group" id="globalTitleGroup">
                <label>Titre du projet</label>
                <input id="globalTitle" class="text-input" placeholder="Titre..." oninput="autoSave()">
            </div>
            
            <div class="input-group" id="itemTitleGroup" style="display:none;">
                <label>Nom de la page</label>
                <input id="itemTitle" class="meta-input" style="font-weight:700" placeholder="Ex: Page 1" oninput="autoSave()">
            </div>

            <!-- ===== BD FULL EDITOR PRO ===== -->
            <div id="bdFullEditor" style="display:none;flex-direction:column;gap:18px;width:100%">
                <div class="bd-toolbar">
                    <div class="bd-section-title"><i class="fas fa-layer-group"></i> Grilles & Fond</div>
                    <div class="meta-row">
                        <div class="input-group" style="flex:2">
                            <label>Image de fond (URL uniquement)</label>
                            <input id="bdBgImageInput" class="meta-input" placeholder="https://..." oninput="onBDBgUrlChange(this.value)">
                        </div>
                        <div class="input-group" style="width:150px">
                            <label>Zoom fond <span id="bdBgScaleVal">100%</span></label>
                            <input type="range" id="bdBgScale" min="0.2" max="15" step="0.05" value="1" oninput="onBDBgScale(this.value)">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Modèles de grilles</label>
                        <div id="bdTemplatesList" class="bd-templates"></div>
                    </div>
                </div>

                <div id="bdCanvasEnhancedWrap" class="bd-canvas-wrap">
                    <div id="bdBgLayer" class="bd-bg-layer"></div>
                    <div id="bdGridContainer" class="bd-grid-container"></div>
                    <div id="bdBubblesPageLayer" style="position:absolute;inset:0;z-index:5;pointer-events:none"></div>
                </div>

                <div id="bdPanelTools" class="bd-toolbar" style="display:none">
                    <div class="bd-section-title"><i class="fas fa-crop"></i> Case sélectionnée <span id="bdSelectedPanelLabel" style="margin-left:8px;color:var(--accent)">-</span></div>
                    <div class="meta-row">
                        <!-- URL ONLY FOR OPTION A -->
                        <div class="input-group" style="flex:2">
                            <label>Image de la case (URL web uniquement)</label>
                            <div style="display:flex;gap:8px">
                                <input id="bdPanelImageUrl" class="meta-input" placeholder="https://..." oninput="onPanelUrlChange(this.value)">
                                <button class="btn btn-danger" onclick="clearPanelImage()"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                        <div class="input-group" style="flex:1">
                            <label>Zoom <span id="bdPanelScaleVal">100%</span></label>
                            <input type="range" id="bdPanelScale" min="0.1" max="15" step="0.05" value="1" oninput="onPanelScale(this.value)">
                        </div>
                    </div>
                </div>

                <div class="bd-toolbar">
                    <div class="bd-section-title"><i class="fas fa-comment-dots"></i> Bulles (Vectorielles & Rapides)</div>
                    
                    <div class="bubble-palette" id="bubblePaletteGrid">
                        <div class="bubble-palette-item" onclick="addBDBubble('oval', 'bc')" title="Ovale bas centre">
                            <div class="mini-bubble oval"></div><div class="bubble-label">Ovale BC</div>
                        </div>
                        <div class="bubble-palette-item" onclick="addBDBubble('oval', 'bl')" title="Ovale bas gauche">
                            <div class="mini-bubble oval"></div><div class="bubble-label">Ovale BL</div>
                        </div>
                        <div class="bubble-palette-item" onclick="addBDBubble('oval', 'br')" title="Ovale bas droite">
                            <div class="mini-bubble oval"></div><div class="bubble-label">Ovale BR</div>
                        </div>
                        <div class="bubble-palette-item" onclick="addBDBubble('round', 'bc')" title="Rond">
                            <div class="mini-bubble round"></div><div class="bubble-label">Rond</div>
                        </div>
                        <div class="bubble-palette-item" onclick="addBDBubble('rect', 'bc')" title="Rectangle">

                        </div>
                        <div class="bubble-palette-item" onclick="addBDBubble('rect', 'zap')" title="Rectangle Eclair">
                            <div class="mini-bubble rect"></div><div class="bubble-label">Radio/Zap</div>

                        <div class="bubble-palette-item" onclick="addBDBubble('capsule', 'bl')" title="Capsule">
                            <div class="mini-bubble capsule"></div><div class="bubble-label">Capsule</div>

                        <div style="display:flex;gap:6px;margin-top:2px;">

                            <button class="color-swatch" style="background:#ffeb3b" onclick="onBubbleBg('#ffeb3b')"></button>
                            <button class="color-swatch" style="background:#ff9800" onclick="onBubbleBg('#ff9800')"></button>
                            <button class="color-swatch" style="background:#f44336" onclick="onBubbleBg('#f44336')"></button>
                            <button class="color-swatch" style="background:#00bcd4" onclick="onBubbleBg('#00bcd4')"></button>
                        </div>

                        <div style="display:flex;gap:8px;margin-top:4px">
                            <button class="btn btn-danger" onclick="deleteSelectedBubble()"><i class="fas fa-trash"></i> Supprimer</button>

<div id="savedToast" class="saved-toast"><i class="fas fa-check-circle" style="color:var(--accent)"></i> Enregistré !</div>

<script>
let currentPageId=null, currentProjectId=null, projects=[], appConfig={fontFamily:'Playfair Display'};
let currentActiveModule = 'comic'; // Forcé en mode comic
let selectedPanelIndex=null, selectedBubbleId=null, dragState=null;
const uid=()=> 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,5);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const BD_TEMPLATES = [
    {id:'full', name:'Plein', rects:[{x:0,y:0,w:100,h:100}]},
    {id:'2h', name:'2-H', rects:[{x:0,y:0,w:100,h:49},{x:0,y:51,w:100,h:49}]},
    {id:'3v', name:'3-V', rects:[{x:0,y:0,w:32,h:100},{x:34,y:0,w:32,h:100},{x:68,y:0,w:32,h:100}]},
    {id:'4', name:'4', rects:[{x:0,y:0,w:49,h:49},{x:51,y:0,w:49,h:49},{x:0,y:51,w:49,h:49},{x:51,y:51,w:49,h:49}]},
    {id:'blacksad', name:'Classique', rects:[{x:0,y:0,w:100,h:38},{x:0,y:40,w:100,h:14},{x:0,y:56,w:32,h:20},{x:34,y:56,w:32,h:20},{x:68,y:56,w:32,h:20},{x:0,y:78,w:100,h:22}]}
];

function getTemplateRects(id){
    let t=BD_TEMPLATES.find(x=>x.id===id); return t?t.rects:[{x:0,y:0,w:100,h:100}];
}

function ensureBDData(item){
    if(!item) return;
    if(!item.bdBg) item.bdBg={tx:0,ty:0,scale:1,rot:0};
    if(item.bdBgImage===undefined) item.bdBgImage='';
    if(!item.bdPanels) item.bdPanels=[{id:uid(), image:'', tx:0,ty:0,scale:1,rot:0}];
    item.bdPanels.forEach(p=>{ if(!p.id) p.id=uid(); });
    if(!item.bdTemplateRects) item.bdTemplateRects=getTemplateRects('full');
    if(!item.bdBubbles) item.bdBubbles=[];
    item.bdBubbles.forEach(b=>{
        if(b.x===undefined) b.x=50; if(b.y===undefined) b.y=50;
        if(!b.w) b.w=30; if(!b.fontSize) b.fontSize=14;
        if(!b.fontFamily) b.fontFamily="'Bangers', cursive";
        if(!b.shape) b.shape='oval'; // Nouvelle logique de shape
        if(!b.tail) b.tail='bc';     // Nouvelle logique de tail SVG
        if(!b.bgColor) b.bgColor = '#ffffff';
    });
}

function toggleDropdown(id) {
    const el = document.getElementById(id);
    const isVis = el.style.display === 'flex';
    closeMenus(); if(!isVis) el.style.display = 'flex';
}
function closeMenus() { document.querySelectorAll('.dropdown-menu').forEach(m => m.style.display='none'); }
document.addEventListener('click',e=>{ if(!e.target.closest('.gen-wrap')) closeMenus(); });

function refreshPageDropdown(){
    const dd=document.getElementById('pageDropdown'); if(!dd) return;
    dd.innerHTML=''; const proj=getCurrentProject(); if(!proj) return;
    proj.data.book.items.forEach(it=>{
        const b=document.createElement('button');
        b.className='dropdown-item'+(it.id===currentPageId?' active':'');
        b.innerHTML= esc(it.title);
        b.onclick=()=>{ selectPage(it.id); closeMenus(); };
        dd.appendChild(b);
    });
    const label=document.getElementById('pageSelectLabel');
    const cur=proj.data.book.items.find(i=>i.id===currentPageId);
    if(label&&cur) label.textContent = cur.title;
}

function selectPage(id){ currentPageId=id; selectedPanelIndex=0; selectedBubbleId=null; loadPageData(); }

function loadProjects(){
    try{
        projects=JSON.parse(localStorage.getItem('writer_projects_v2')||'[]');
        currentProjectId=localStorage.getItem('writer_current_project_id');
        if(projects.length===0){
            const p={id:uid(),title:'Mon Comic',data:{book:{title:'Mon Comic',items:[{id:'cover',type:'cover',title:'Couverture',showTitle:true,image:'',bdPanels:[],bdBubbles:[]},{id:'ch1',type:'chapter',title:'Page 1',bdTemplate:'blacksad',bdTemplateRects:getTemplateRects('blacksad'),bdBgImage:'',bdBg:{tx:0,ty:0,scale:1,rot:0},bdPanels:[{id:uid(),image:'',tx:0,ty:0,scale:1,rot:0},{id:uid(),image:'',tx:0,ty:0,scale:1,rot:0},{id:uid(),image:'',tx:0,ty:0,scale:1,rot:0},{id:uid(),image:'',tx:0,ty:0,scale:1,rot:0},{id:uid(),image:'',tx:0,ty:0,scale:1,rot:0},{id:uid(),image:'',tx:0,ty:0,scale:1,rot:0}],bdBubbles:[]}]}},config:{},mode:'comic',updatedAt:Date.now()};
            projects=[p]; currentProjectId=p.id; saveProjects();
        }
        if(!projects.find(p=>p.id===currentProjectId)) currentProjectId=projects[0].id;
    }catch(e){}
}

function saveProjects(){
    try {
        localStorage.setItem('writer_projects_v2',JSON.stringify(projects));
        localStorage.setItem('writer_current_project_id',currentProjectId);
    } catch(e) {
        if (e.name === 'QuotaExceededError') {
            alert("⚠️ Stockage plein ! Supprimez d'anciens projets.");
        }
    }
}

function getCurrentProject(){ return projects.find(p=>p.id===currentProjectId); }

function loadProjectIntoUI(){
    const proj=getCurrentProject(); if(!proj) return;
    document.getElementById('globalTitle').value=proj.data.book.title||proj.title;
    refreshPageDropdown(); currentPageId = null; selectedPanelIndex=0; loadPageData();
}

function activateModule(mode) { currentActiveModule = mode; }

function loadPageData(){
    const proj=getCurrentProject(); if(!proj || !proj.data.book.items.length) return;
    if(!currentPageId) currentPageId = proj.data.book.items[0].id;
    const item=proj.data.book.items.find(i=>i.id===currentPageId); if(!item) return;

    if(item.type==='cover'){
        document.getElementById('globalTitleGroup').style.display='flex';
        document.getElementById('itemTitleGroup').style.display='none';
        document.getElementById('bdFullEditor').style.display='none';
    } else {
        document.getElementById('globalTitleGroup').style.display='none';
        document.getElementById('itemTitleGroup').style.display='flex';
        document.getElementById('itemTitle').value=item.title||'';
        document.getElementById('bdFullEditor').style.display='flex';
        ensureBDData(item);
        if(selectedPanelIndex===null) selectedPanelIndex=0;
        renderBDTemplatesList(); renderBDCanvas();
    }
    refreshPageDropdown();
}

function renderBDTemplatesList(){
    const container=document.getElementById('bdTemplatesList'); if(!container) return;
    container.innerHTML=''; const curItem=getCurrentProject()?.data.book.items.find(i=>i.id===currentPageId);
    const curTmpl=curItem?.bdTemplate||'full';

    BD_TEMPLATES.forEach(t=>{
        let div=document.createElement('div'); div.className='template-thumb'+(curTmpl===t.id?' active':''); div.title=t.name;
        t.rects.forEach(r=>{
            let p=document.createElement('div');
            p.style.cssText=`position:absolute;left:${r.x}%;top:${r.y}%;width:${r.w}%;height:${r.h}%;background:rgba(255,255,255,0.9);border:1px solid #111;box-sizing:border-box`;
            div.appendChild(p);
        });
        div.onclick=()=>setBDTemplate(t.id); container.appendChild(div);
    });
}

function setBDTemplate(id){
    const proj=getCurrentProject(); const item=proj.data.book.items.find(i=>i.id===currentPageId); if(!item) return; ensureBDData(item);
    let rects=getTemplateRects(id); let newPanels=[];
    for(let i=0;i<rects.length;i++){
        if(i<item.bdPanels.length) newPanels.push(item.bdPanels[i]);
        else newPanels.push({id:uid(), image:'', tx:0,ty:0,scale:1,rot:0});
    }
    item.bdPanels=newPanels; item.bdTemplate=id; item.bdTemplateRects=rects;
    selectedPanelIndex=0; renderBDTemplatesList(); renderBDCanvas(); autoSave();
}

// ===== MOTEUR SVG DES FLÈCHES =====
// Retourne une chaine SVG pure pour une flèche ultra-nette
function getTailSVG(tailType, bgColor) {
    if(tailType === 'none') return '';
    
    let path = ''; let extraStyles = '';
    const strokeW = 2.5;

    if(tailType === 'bc') {
        // Courbe parfaite pointant vers le bas centre
        path = `M 2 0 Q 12 10 12 24 Q 16 10 22 0`;
        extraStyles = `bottom:-23px; left:50%; transform:translateX(-50%); width:24px; height:24px;`;
    } else if(tailType === 'bl') {
        path = `M 0 0 Q 0 15 15 24 Q 8 10 12 0`;
        extraStyles = `bottom:-23px; left:20%; width:24px; height:24px;`;
    } else if(tailType === 'br') {
        path = `M 24 0 Q 24 15 9 24 Q 16 10 12 0`;
        extraStyles = `bottom:-23px; right:20%; width:24px; height:24px;`;
    } else if(tailType === 'thought') {
        // Ronds de pensée sans outline sur le haut pour la fusion, dessiné manuellement
        return `<svg width="20" height="28" viewBox="0 0 20 28" style="position:absolute; bottom:-26px; left:20%; z-index:-1; overflow:visible;">
            <circle cx="10" cy="5" r="5" fill="${bgColor}" stroke="#111" stroke-width="${strokeW}"/>
            <circle cx="6" cy="16" r="3.5" fill="${bgColor}" stroke="#111" stroke-width="${strokeW}"/>
            <circle cx="2" cy="24" r="2" fill="${bgColor}" stroke="#111" stroke-width="${strokeW}"/>
        </svg>`;
    } else if(tailType === 'zap') {
        // Queue style radio / éclair (chemin ouvert pour ne pas fermer le haut)
        path = `M 6 0 L 14 12 L 6 12 L 12 24`;
        extraStyles = `bottom:-23px; left:25%; width:20px; height:24px;`;
    }

    return `<svg viewBox="0 0 24 24" style="position:absolute; z-index:-1; overflow:visible; ${extraStyles}">
        <path d="${path}" fill="${bgColor}" stroke="#111" stroke-width="${strokeW}" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
}

function createBubbleElement(b) {
    let div = document.createElement('div');
    div.className = 'bd-bubble shape-' + b.shape + (selectedBubbleId === b.id ? ' selected' : '');
    div.dataset.bubbleId = b.id;
    
    div.style.left = b.x + '%';
    div.style.top = b.y + '%';
    div.style.width = b.w + '%';
    div.style.fontFamily = b.fontFamily;
    div.style.fontSize = b.fontSize + 'px';
    div.style.background = b.bgColor;
    div.style.transform = 'translate(-50%, -50%)';

    // Injection du SVG de la queue
    div.innerHTML = `<span>${esc(b.text)}</span>` + getTailSVG(b.tail, b.bgColor);

    div.addEventListener('mousedown', (e) => onBubbleMouseDown(e, b.id));
    div.addEventListener('click', (e) => { e.stopPropagation(); selectBubble(b.id); });
    div.addEventListener('dblclick', (e) => { e.stopPropagation(); selectBubble(b.id); document.getElementById('bdBubbleText').focus(); });

    return div;
}

function renderBDCanvas(){
    const proj=getCurrentProject(); const item=proj.data.book.items.find(i=>i.id===currentPageId); if(!item || item.type!=='chapter') return;
    ensureBDData(item);
    const bgLayer=document.getElementById('bdBgLayer'); const gridContainer=document.getElementById('bdGridContainer'); const pageLayer=document.getElementById('bdBubblesPageLayer');
    if(!bgLayer||!gridContainer) return;
    bgLayer.innerHTML=''; gridContainer.innerHTML=''; if(pageLayer) pageLayer.innerHTML='';

    if(item.bdBgImage){
        let img=document.createElement('img');
        img.src=item.bdBgImage; img.style.cssText=`position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transform:translate(${item.bdBg.tx||0}px, ${item.bdBg.ty||0}px) scale(${item.bdBg.scale||1});transform-origin:center center;pointer-events:none;`;
        bgLayer.appendChild(img);
    }

    item.bdTemplateRects.forEach((rect, idx)=>{
        let panelData=item.bdPanels[idx]; if(!panelData) return;
        let panelDiv=document.createElement('div');
        panelDiv.className='bd-panel'+(selectedPanelIndex===idx?' selected':'');
        panelDiv.style.cssText=`left:${rect.x}%; top:${rect.y}%; width:${rect.w}%; height:${rect.h}%;`;
        panelDiv.dataset.index=idx;

        if(panelData.image){
            let img=document.createElement('img'); img.src=panelData.image;
            img.style.transform=`translate(${panelData.tx||0}px, ${panelData.ty||0}px) scale(${panelData.scale||1}) rotate(${panelData.rot||0}deg)`;
            panelDiv.appendChild(img);
        } else {
            panelDiv.innerHTML=`<div class="bd-panel-placeholder"><span>URL Image =></span></div>`;
        }

        let bubblesInPanel=item.bdBubbles.filter(b=>b.panelIndex===idx);
        bubblesInPanel.forEach(b=>{ panelDiv.appendChild(createBubbleElement(b)); });

        panelDiv.addEventListener('mousedown', (e)=>onPanelMouseDown(e, idx));
        panelDiv.addEventListener('wheel', (e)=>onPanelWheel(e, idx), {passive:false});
        panelDiv.addEventListener('click', (e)=>{ if(e.target.closest('.bd-bubble')) return; selectPanel(idx); });
        
        gridContainer.appendChild(panelDiv);
    });

    if(pageLayer){
        pageLayer.style.pointerEvents='none';
        let pageBubbles=item.bdBubbles.filter(b=>b.panelIndex===null || b.panelIndex===undefined);
        pageBubbles.forEach(b=>{ let el=createBubbleElement(b); el.style.pointerEvents='auto'; pageLayer.appendChild(el); });
    }
}

function selectPanel(idx){
    selectedPanelIndex=idx; selectedBubbleId=null; renderBDCanvas();
    document.getElementById('bdPanelTools').style.display='flex';
    document.getElementById('bdBubbleEdit').style.display='none';
    const proj=getCurrentProject(); const item=proj.data.book.items.find(i=>i.id===currentPageId); const p=item.bdPanels[idx];
    if(p){
        document.getElementById('bdSelectedPanelLabel').textContent='Case '+(idx+1);
        document.getElementById('bdPanelImageUrl').value=p.image||'';
        document.getElementById('bdPanelScale').value=p.scale||1; document.getElementById('bdPanelScaleVal').textContent=Math.round((p.scale||1)*100)+'%';
    }
}

function onPanelUrlChange(val){
    if(selectedPanelIndex===null) return; const proj=getCurrentProject(); const item=proj.data.book.items.find(i=>i.id===currentPageId);
    item.bdPanels[selectedPanelIndex].image=val; renderBDCanvas(); autoSave();
}
function onPanelScale(val){
    if(selectedPanelIndex===null) return; const proj=getCurrentProject(); const item=proj.data.book.items.find(i=>i.id===currentPageId);
    item.bdPanels[selectedPanelIndex].scale=parseFloat(val); document.getElementById('bdPanelScaleVal').textContent=Math.round(parseFloat(val)*100)+'%'; renderBDCanvas(); autoSave();
}
function clearPanelImage(){
    if(selectedPanelIndex===null) return; const proj=getCurrentProject(); const item=proj.data.book.items.find(i=>i.id===currentPageId);
    item.bdPanels[selectedPanelIndex].image=''; renderBDCanvas(); autoSave();
}

function onBDBgUrlChange(val){ const proj=getCurrentProject(); const item=proj.data.book.items.find(i=>i.id===currentPageId); ensureBDData(item); item.bdBgImage=val; renderBDCanvas(); autoSave(); }
function onBDBgScale(val){ const proj=getCurrentProject(); const item=proj.data.book.items.find(i=>i.id===currentPageId); ensureBDData(item); item.bdBg.scale=parseFloat(val); document.getElementById('bdBgScaleVal').textContent=Math.round(parseFloat(val)*100)+'%'; renderBDCanvas(); autoSave(); }

function onPanelMouseDown(e, idx){
    if(e.target.closest('.bd-bubble')) return;
    const proj=getCurrentProject(); const item=proj.data.book.items.find(i=>i.id===currentPageId); ensureBDData(item);
    const panel=item.bdPanels[idx]; if(!panel.image) return;
    dragState={type:'panelImage', idx, startX:e.clientX, startY:e.clientY, origTx:panel.tx||0, origTy:panel.ty||0};
    e.preventDefault();
}
function onPanelWheel(e, idx){
    e.preventDefault(); const proj=getCurrentProject(); const item=proj.data.book.items.find(i=>i.id===currentPageId); ensureBDData(item);
    const panel=item.bdPanels[idx]; if(!panel.image) return;
    if(e.shiftKey){
        panel.rot=(panel.rot||0)+(e.deltaY>0?-3:3);
    } else {
        panel.scale=Math.min(15,Math.max(0.1,(panel.scale||1)+(e.deltaY>0?-0.07:0.07)));
        if(selectedPanelIndex===idx){ document.getElementById('bdPanelScale').value=panel.scale; document.getElementById('bdPanelScaleVal').textContent=Math.round(panel.scale*100)+'%'; }
    }
    renderBDCanvas(); autoSave();
}

function addBDBubble(shape, tail){
    const proj=getCurrentProject(); const item=proj.data.book.items.find(i=>i.id===currentPageId); ensureBDData(item);
    let newBubble={ id:uid(), panelIndex:selectedPanelIndex, shape:shape, tail:tail, text:'TEXTE', x:50, y:30, w:30, fontFamily:"'Bangers', cursive", fontSize:14, bgColor:'#ffffff' };
    item.bdBubbles.push(newBubble); selectedBubbleId=newBubble.id;
    renderBDCanvas(); selectBubble(newBubble.id); autoSave();
}

function onBubbleMouseDown(e, bubbleId){
    e.stopPropagation(); const proj=getCurrentProject(); const item=proj.data.book.items.find(i=>i.id===currentPageId);
    let bubble=item.bdBubbles.find(b=>b.id===bubbleId); if(!bubble) return;
    let panelEl=e.target.closest('.bd-panel'); let parentRect=panelEl?panelEl.getBoundingClientRect():document.getElementById('bdCanvasEnhancedWrap').getBoundingClientRect();
    dragState={type:'bubble', bubbleId, startX:e.clientX, startY:e.clientY, origX:bubble.x, origY:bubble.y, parentRect};
    selectBubble(bubbleId); e.preventDefault();
}

function selectBubble(id){
    selectedBubbleId=id; const proj=getCurrentProject(); const item=proj.data.book.items.find(i=>i.id===currentPageId);
    let bubble=item.bdBubbles.find(b=>b.id===id); if(!bubble) return;
    document.getElementById('bdBubbleEdit').style.display='flex';
    document.getElementById('bdBubbleText').value=bubble.text;
    document.getElementById('bdBubbleFont').value=bubble.fontFamily;
    document.getElementById('bdBubbleSize').value=bubble.fontSize; document.getElementById('bdBubbleSizeVal').textContent=bubble.fontSize+'px';
    document.getElementById('bdBubbleWidth').value=bubble.w || 30; document.getElementById('bdBubbleWidthVal').textContent=(bubble.w || 30)+'%';
    document.getElementById('bdBubbleBg').value=bubble.bgColor || '#ffffff';
    renderBDCanvas();
}

function onBubbleTextChange(val){
    const proj=getCurrentProject(); const item=proj.data.book.items.find(i=>i.id===currentPageId);
    let bubble=item.bdBubbles.find(b=>b.id===selectedBubbleId);
    if(bubble){
        bubble.text=val;
        let el=document.querySelector(`[data-bubble-id="${bubble.id}"] span`); // Update text without killing the SVG tail
        if(el) el.textContent=val; 
        autoSave();
    }
}
function onBubbleFontChange(val){ const proj=getCurrentProject(); const item=proj.data.book.items.find(i=>i.id===currentPageId); let bubble=item.bdBubbles.find(b=>b.id===selectedBubbleId); if(bubble){ bubble.fontFamily=val; renderBDCanvas(); autoSave(); } }
function onBubbleSize(val){ const proj=getCurrentProject(); const item=proj.data.book.items.find(i=>i.id===currentPageId); let bubble=item.bdBubbles.find(b=>b.id===selectedBubbleId); if(bubble){ bubble.fontSize=parseInt(val); document.getElementById('bdBubbleSizeVal').textContent=val+'px'; renderBDCanvas(); autoSave(); } }
function onBubbleWidth(val){ const proj=getCurrentProject(); const item=proj.data.book.items.find(i=>i.id===currentPageId); let bubble=item.bdBubbles.find(b=>b.id===selectedBubbleId); if(bubble){ bubble.w=parseInt(val); document.getElementById('bdBubbleWidthVal').textContent=val+'%'; renderBDCanvas(); autoSave(); } }
function onBubbleBg(val){ const proj=getCurrentProject(); const item=proj.data.book.items.find(i=>i.id===currentPageId); let bubble=item.bdBubbles.find(b=>b.id===selectedBubbleId); if(bubble){ bubble.bgColor=val; document.getElementById('bdBubbleBg').value=val; renderBDCanvas(); autoSave(); } }

function deleteSelectedBubble(){
    if(!selectedBubbleId) return; const proj=getCurrentProject(); const item=proj.data.book.items.find(i=>i.id===currentPageId);
    item.bdBubbles=item.bdBubbles.filter(b=>b.id!==selectedBubbleId);
    selectedBubbleId=null; document.getElementById('bdBubbleEdit').style.display='none'; renderBDCanvas(); autoSave();
}
function duplicateBubble(){
    if(!selectedBubbleId) return; const proj=getCurrentProject(); const item=proj.data.book.items.find(i=>i.id===currentPageId);
    let orig=item.bdBubbles.find(b=>b.id===selectedBubbleId); if(!orig) return;
    let copy={...orig, id:uid(), x:Math.min(90,orig.x+5), y:Math.min(90,orig.y+5)};
    item.bdBubbles.push(copy); selectedBubbleId=copy.id; renderBDCanvas(); selectBubble(copy.id); autoSave();
}

document.addEventListener('mousemove', (e)=>{
    if(!dragState) return;
    const proj=getCurrentProject(); const item=proj.data.book.items.find(i=>i.id===currentPageId); if(!item) return;
    if(dragState.type==='panelImage'){
        let dx=e.clientX-dragState.startX, dy=e.clientY-dragState.startY;
        let panel=item.bdPanels[dragState.idx]; panel.tx=dragState.origTx+dx; panel.ty=dragState.origTy+dy;
        let img=document.querySelector(`.bd-panel[data-index="${dragState.idx}"] img`);
        if(img) img.style.transform=`translate(${panel.tx}px,${panel.ty}px) scale(${panel.scale}) rotate(${panel.rot}deg)`;
    } else if(dragState.type==='bubble'){
        let dx=e.clientX-dragState.startX, dy=e.clientY-dragState.startY;
        let newLeft=dragState.origX+(dx/dragState.parentRect.width)*100;
        let newTop=dragState.origY+(dy/dragState.parentRect.height)*100;
        let bubble=item.bdBubbles.find(b=>b.id===dragState.bubbleId);
        if(bubble){
            bubble.x=Math.max(5,Math.min(95,newLeft)); bubble.y=Math.max(5,Math.min(95,newTop));
            let el=document.querySelector(`[data-bubble-id="${bubble.id}"]`);
            if(el){ el.style.left=bubble.x+'%'; el.style.top=bubble.y+'%'; }
        }
    }
});
document.addEventListener('mouseup', ()=>{
    if(dragState){
        if(dragState.type==='bubble' || dragState.type==='panelImage'){ renderBDCanvas(); autoSave(); }
        dragState=null;
    }
});

function prevPage(){
    const items=getCurrentProject().data.book.items; const idx=items.findIndex(i=>i.id===currentPageId);
    if(idx>0){ selectPage(items[idx-1].id); }
}
function nextPage(){
    const items=getCurrentProject().data.book.items; const idx=items.findIndex(i=>i.id===currentPageId);
    if(idx<items.length-1){ selectPage(items[idx+1].id); }
}

function _doSaveCore() {
    const proj=getCurrentProject(); if(!proj) return;
    const item=proj.data.book.items.find(i=>i.id===currentPageId); if(!item) return;
    if(item.type==='cover'){
        const nt=document.getElementById('globalTitle').value.trim()||'Mon Comic';
        proj.title=nt; proj.data.book.title=nt; item.showTitle=true;
    }
    if(document.getElementById('itemTitle')) item.title=document.getElementById('itemTitle').value.trim()||'Page';
    
    proj.updatedAt=Date.now(); saveProjects();
    const ind=document.getElementById('syncIndicator'); if(ind) ind.innerHTML='<i class="fas fa-check-circle"></i> sync';
    document.getElementById('savedToast').classList.add('show'); setTimeout(()=>document.getElementById('savedToast').classList.remove('show'),1500);
}

function autoSave(){
    const ind=document.getElementById('syncIndicator'); if(ind) ind.innerHTML='<i class="fas fa-circle-notch fa-spin"></i> sync';
    clearTimeout(window._t); window._t=setTimeout(_doSaveCore, 1500); // 1.5s delay to prevent lag while dragging
}
function manualSave(){ clearTimeout(window._t); _doSaveCore(); }

function addPage(){
    const proj=getCurrentProject(); const nid='ch_'+Date.now();
    const newItem={id:nid,type:'chapter',title:`Page ${proj.data.book.items.length}`,bdTemplate:'blacksad',bdTemplateRects:getTemplateRects('blacksad'),bdBgImage:'',bdBg:{tx:0,ty:0,scale:1,rot:0},bdPanels:[{id:uid(),image:'',tx:0,ty:0,scale:1,rot:0},{id:uid(),image:'',tx:0,ty:0,scale:1,rot:0},{id:uid(),image:'',tx:0,ty:0,scale:1,rot:0},{id:uid(),image:'',tx:0,ty:0,scale:1,rot:0},{id:uid(),image:'',tx:0,ty:0,scale:1,rot:0},{id:uid(),image:'',tx:0,ty:0,scale:1,rot:0}],bdBubbles:[]};
    proj.data.book.items.push(newItem);
    currentPageId=nid; selectedPanelIndex=0; saveProjects(); loadProjectIntoUI(); autoSave();
}
function deletePage(){
    const it=getCurrentProject().data.book.items.find(i=>i.id===currentPageId);
    if(it.type==='cover') return alert('Page cover non supprimable');
    if(!confirm('Supprimer cette page ?')) return;
    getCurrentProject().data.book.items=getCurrentProject().data.book.items.filter(i=>i.id!==currentPageId);
    currentPageId=getCurrentProject().data.book.items[0].id;
    saveProjects(); loadProjectIntoUI();
}

function buildBDHTML(item){
    ensureBDData(item);
    let rects=item.bdTemplateRects||[{x:0,y:0,w:100,h:100}];
    let html=`<div style="position:relative;width:100%;max-width:800px;margin:0 auto;aspect-ratio:1/1.414;background:#fff;border:3.5px solid #111;overflow:hidden;box-sizing:border-box">`;
    if(item.bdBgImage) html+=`<img src="${item.bdBgImage}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:translate(${item.bdBg.tx||0}px,${item.bdBg.ty||0}px) scale(${item.bdBg.scale||1});" />`;
    
    function genBubble(b, z){
        let sType = b.shape||'oval';
        let bShape = '';
        if(sType==='oval') bShape='border-radius:50%/50%;';
        else if(sType==='round') bShape='border-radius:50%; aspect-ratio:1/1;';
        else if(sType==='rect') bShape='border-radius:8px;';
        else if(sType==='capsule') bShape='border-radius:999px;';
        else if(sType==='cloud') bShape='border-radius:42% 58% 55% 45% / 48% 42% 58% 52%;';
        
        let shadow = (sType==='burst') ? 'border:none; box-shadow:none;' : 'border:2.5px solid #111; box-shadow: 4px 4px 0px rgba(17,17,17,1);';
        if(sType==='burst') bShape='clip-path: polygon(50% 0%, 66% 10%, 86% 2%, 76% 26%, 100% 22%, 84% 42%, 100% 62%, 82% 72%, 96% 96%, 68% 84%, 50% 100%, 32% 84%, 4% 96%, 18% 72%, 0% 62%, 16% 42%, 0% 22%, 24% 26%, 14% 2%, 34% 10%); padding:1.5em;';
        
        let tailStr = getTailSVG(b.tail, b.bgColor);
        return `<div style="position:absolute; left:${b.x}%; top:${b.y}%; width:${b.w}%; transform:translate(-50%,-50%); background:${b.bgColor}; font-family:${b.fontFamily}; font-size:${b.fontSize}px; font-weight:700; color:#111; white-space:pre-wrap; overflow-wrap:break-word; text-align:center; box-sizing:border-box; display:flex; align-items:center; justify-content:center; z-index:${z}; line-height:1.15; padding:0.8em 1.2em; ${bShape} ${shadow}"><span>${esc(b.text)}</span>${tailStr}</div>`;
    }

    rects.forEach((r,i)=>{
        let p=item.bdPanels[i]; if(!p) return;
        html+=`<div style="position:absolute;left:${r.x}%;top:${r.y}%;width:${r.w}%;height:${r.h}%;border:2.5px solid #111;overflow:hidden;background:#fff;box-sizing:border-box">`;
        if(p.image) html+=`<img src="${p.image}" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transform:translate(${p.tx||0}px,${p.ty||0}px) scale(${p.scale||1}) rotate(${p.rot||0}deg);" />`;
        item.bdBubbles.filter(b=>b.panelIndex===i).forEach(b=>{ html+=genBubble(b, 10); });
        html+=`</div>`;
    });
    item.bdBubbles.filter(b=>b.panelIndex===null || b.panelIndex===undefined).forEach(b=>{ html+=genBubble(b, 15); });
    
    html+=`</div>`; return html;
}

function openPreview(){
    autoSave(); const proj=getCurrentProject(); const item=proj.data.book.items.find(i=>i.id===currentPageId);
    if(item.type!=='chapter') return alert("Aperçu disponible pour les pages BD uniquement.");
    document.getElementById('prvContent').innerHTML=buildBDHTML(item);
    document.getElementById('previewModal').classList.add('active');
}
function closePreview(){ document.getElementById('previewModal').classList.remove('active'); }

window.onload=()=>{
    try { loadProjects(); bootstrapApp(); } catch(e) {}
};
</script>
