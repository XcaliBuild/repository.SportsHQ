<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NOVA POS Ultra V6.5</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --brand-blue: #0066FF; --brand-yellow: #FBBF24; --brand-green: #22C55E; --brand-red: #EF4444; --brand-purple: #A855F7; --brand-pink: #EC4899; --bg-page: #0F172A; --surface-white: #1E293B; --text-dark: #F8FAFC; --text-gray: #94A3B8; --border-light: #334155; }
        [data-theme="light"] { --bg-page: #F3F4F6; --surface-white: #FFFFFF; --text-dark: #111827; --text-gray: #6B7280; --border-light: #E5E7EB; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; user-select: none; }
        body { background-color: var(--bg-page); color: var(--text-dark); height: 100vh; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 16px; background: var(--surface-white); border-bottom: 1px solid var(--border-light); height: 60px; flex-shrink: 0; }
        .brand { font-size: 1.1rem; font-weight: 800; }
        .icon-btn { background: var(--bg-page); border: none; color: var(--text-gray); width: 38px; height: 38px; border-radius: 50%; cursor: pointer;}
        
        .swipe-container { display: flex; width: 600%; flex: 1; transition: transform 0.3s ease-out; overflow: hidden; }
        .screen { width: 16.666%; padding: 12px; display: flex; flex-direction: column; height: 100%; }
        
        .terminal-screen { color: white; padding: 15px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); margin-bottom: 10px; }
        .total-display { font-size: 2.2rem; font-weight: 800; text-align: center; }
        
        .cart-list-blue { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.1); border-radius: 12px; padding: 10px; font-size: 0.9rem; }
        .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .num-btn { background: var(--surface-white); border: 1px solid var(--border-light); height: 45px; border-radius: 8px; font-size: 1.2rem; cursor: pointer; }
        .btn-enter { background: var(--brand-blue); color: white; border: none; }
        
        .action-row { display: flex; gap: 8px; margin-top: 8px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; z-index: 100; }
        .modal-backdrop.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--surface-white); padding: 20px; width: 90%; max-width: 400px; border-radius: 20px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 10px; text-align: left; }
        .form-control { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-light); background: var(--bg-page); color: var(--text-dark); }
        
        .stock-indicator { padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; color: white; }
        .bg-red { background: var(--brand-red); }
        .bg-orange { background: var(--brand-yellow); }
        .bg-green { background: var(--brand-green); }
    </style>
</head>
<body data-theme="light">

    <!-- Header -->
    <header>
        <div class="brand"><i class="fa-solid fa-cube" style="color:var(--brand-blue)"></i> NOVA POS</div>
        <button class="icon-btn" onclick="openModal('settings-modal')"><i class="fa-solid fa-gear"></i></button>
    </header>

    <div class="swipe-container" id="swipe-container">
        <!-- VENTE (BLEU) -->
        <div class="screen" style="background:var(--brand-blue)">
            <div class="terminal-screen" style="background:rgba(0,0,0,0.2)">
                <div class="total-display" id="cart-total">0.00 €</div>
                <div class="cart-list-blue" id="cart-list"></div>
            </div>
            <!-- Form Client -->
            <div class="action-row">
                <input id="client-info" class="form-control" placeholder="Nom Client / Tel / Adresse">
            </div>
            <div class="numpad-grid" style="margin-top:10px">
                <button class="num-btn" onclick="typeNum('7')">7</button><button class="num-btn" onclick="typeNum('8')">8</button><button class="num-btn" onclick="typeNum('9')">9</button>
                <button class="num-btn" onclick="typeNum('4')">4</button><button class="num-btn" onclick="typeNum('5')">5</button><button class="num-btn" onclick="typeNum('6')">6</button>
                <button class="num-btn" onclick="typeNum('1')">1</button><button class="num-btn" onclick="typeNum('2')">2</button><button class="num-btn" onclick="typeNum('3')">3</button>
                <button class="num-btn" onclick="backspaceNum()"><i class="fa-solid fa-backspace"></i></button>
                <button class="num-btn" onclick="typeNum('0')">0</button>
                <button class="num-btn btn-enter" onclick="submitBarcode()">+</button>
            </div>
            <div class="action-row">
                <button class="btn" onclick="openPaymentLink()">Lien</button>
                <button class="btn btn-enter" onclick="processCheckout('CS')">ENCAISSER (CS)</button>
            </div>
        </div>
        <!-- (Les autres écrans suivent la même logique...) -->
    </div>

    <!-- Modale Settings (Entreprise) -->
    <div class="modal-backdrop" id="settings-modal">
        <div class="modal-content">
            <h3>Paramètres Entreprise</h3>
            <div class="form-group"><label>Nom Entreprise</label><input id="set-name" class="form-control"></div>
            <div class="form-group"><label>Adresse</label><input id="set-addr" class="form-control"></div>
            <div class="form-group"><label>Tel / WhatsApp</label><input id="set-tel" class="form-control"></div>
            <div class="form-group"><label>Email</label><input id="set-mail" class="form-control"></div>
            <div class="form-group"><label>Nom du Backup</label><input id="set-backup-name" class="form-control" value="Backup_NovaPOS"></div>
            <button class="btn btn-enter" onclick="saveCompanySettings()">Sauvegarder</button>
        </div>
    </div>

</body>
</html>
