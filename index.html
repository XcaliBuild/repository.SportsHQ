<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NOVA POS Ultra V6.3</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --brand-blue: #0066FF; --brand-yellow: #FBBF24; --brand-green: #22C55E; 
            --brand-red: #EF4444; --brand-purple: #A855F7; --brand-pink: #EC4899;
            --bg-page: #0F172A; --surface-white: #1E293B; --text-dark: #F8FAFC; 
            --text-gray: #94A3B8; --border-light: #334155;
            --radius-xl: 20px; --radius-btn: 12px; --shadow-soft: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
        [data-theme="light"] { 
            --bg-page: #F3F4F6; --surface-white: #FFFFFF; --text-dark: #111827; 
            --text-gray: #6B7280; --border-light: #E5E7EB; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg-page); color: var(--text-dark); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 0 16px; background: var(--surface-white); border-bottom: 1px solid var(--border-light); height: 60px; flex-shrink: 0; }
        .brand { display: flex; align-items: center; gap: 8px; font-size: 1.1rem; font-weight: 800; color: var(--text-dark); }
        .brand i { color: var(--brand-blue); font-size: 1.3rem;}
        
        .page-indicator { display: flex; gap: 6px; }
        .page-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border-light); transition: 0.3s; }
        .page-dot.active { width: 18px; border-radius: 10px; }
        
        .icon-btn { background: var(--bg-page); border: none; color: var(--text-gray); width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;}

        .swipe-container { display: flex; width: 600%; flex: 1; transition: transform 0.3s ease-out; overflow: hidden; }
        
        .screen { width: 16.666%; padding: 12px; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; height: 100%; }

        /* Écrans Terminaux (Haut) */
        .terminal-screen { color: white; padding: 15px; border-radius: var(--radius-xl); box-shadow: var(--shadow-soft); display: flex; flex-direction: column; flex-shrink: 0;}
        .screen-0 .terminal-screen { background: var(--brand-blue); flex: 1; min-height: 0; margin-bottom: 10px; }
        .screen-1 .terminal-screen { background: var(--brand-yellow); color: #111827; margin-bottom: 15px;}
        .screen-2 .terminal-screen { background: var(--brand-green); margin-bottom: 15px;}
        .screen-3 .terminal-screen { background: var(--brand-red); margin-bottom: 15px;}
        .screen-4 .terminal-screen { background: var(--brand-purple); margin-bottom: 15px;}
        .screen-5 .terminal-screen { background: var(--brand-pink); margin-bottom: 15px;}

        .total-label { font-size: 0.8rem; font-weight: 600; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; text-align: center;}
        .total-display { font-size: 2.8rem; font-weight: 800; margin: 2px 0 8px; line-height: 1; text-align: center;}
        .input-box { background: rgba(255,255,255,0.15); padding: 8px; border-radius: 10px; font-size: 1rem; letter-spacing: 2px; text-align: center; font-family: monospace;}

        /* Panier DANS le Bleu */
        .cart-list-blue { flex: 1; overflow-y: auto; margin-top: 10px; background: rgba(0,0,0,0.1); border-radius: 12px; padding: 5px; }
        .cart-item-blue { display: flex; justify-content: space-between; align-items: center; padding: 10px; font-size: 0.9rem; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .cart-item-blue:last-child { border-bottom: none; }
        .cart-qty-badge { background: white; color: var(--brand-blue); padding: 2px 6px; border-radius: 6px; font-size: 0.75rem; margin-right: 8px;}
        .cart-item-blue span:last-child { display: flex; align-items: center; gap: 10px; }
        .cart-item-blue i { padding: 5px; cursor: pointer; color: rgba(255,255,255,0.6); font-size: 1.1rem; }

        /* Numpad & Actions */
        .bottom-actions { flex-shrink: 0; }
        .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .num-btn { background: var(--surface-white); border: 1px solid var(--border-light); color: var(--text-dark); height: 50px; border-radius: var(--radius-btn); font-size: 1.3rem; font-weight: 600; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .num-btn:active { background: var(--border-light); transform: scale(0.95); }
        .btn-enter { background: var(--brand-blue); color: white; border: none; }

        /* Correction Boutons "Géants" */
        .action-row { display: flex; gap: 8px; margin-bottom: 5px;}
        .btn { flex-shrink: 0; padding: 12px 14px; border: none; border-radius: var(--radius-btn); font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 48px; width: 100%; margin-bottom: 10px; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--brand-blue); color: white; }
        .btn-secondary { background: var(--surface-white); color: var(--text-dark); border: 1px solid var(--border-light); }
        .mt-auto { margin-top: auto; } /* Pousse le bouton vers le bas sans l'étirer */

        /* Formulaires & Listes */
        .scrollable-content { flex: 1; overflow-y: auto; margin-bottom: 10px; }
        .form-group { margin-bottom: 12px; text-align: left;}
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-gray); font-weight: 600; margin-bottom: 4px; }
        .form-control { width: 100%; padding: 10px; background: var(--bg-page); border: 1px solid var(--border-light); border-radius: var(--radius-btn); font-size: 1rem; color: var(--text-dark); outline: none; }
        .form-control:focus { border-color: var(--brand-blue); }

        /* Inventaire Cliquable */
        .product-list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--surface-white); border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--border-light); cursor: pointer;}
        .product-list-item:active { background: var(--border-light); }
        .stock-badge { font-size: 0.75rem; background: var(--bg-page); color: var(--text-gray); padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
        .stock-low { color: var(--brand-red); background: rgba(239, 68, 68, 0.1); }
        .dots-menu { cursor: pointer; padding: 10px; color: var(--text-gray); font-size: 1.2rem;}

        /* Scanner */
        #reader { width: 100%; border-radius: 16px; overflow: hidden; margin-bottom: 10px; background: black; }

        /* Modales */
        .modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; z-index: 100; transition: 0.2s; }
        .modal-backdrop.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--surface-white); border-radius: var(--radius-xl); padding: 20px; width: 90%; max-width: 380px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); transform: translateY(20px); transition: 0.3s; max-height: 90dvh; overflow-y: auto;}
        .modal-backdrop.active .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: 800; font-size: 1.1rem; }
        
        /* Lien de Paiement */
        .payment-link-card { background: var(--bg-page); border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 15px; border: 1px solid var(--border-light); }
        .payment-link-amount { font-size: 2.5rem; font-weight: 800; margin: 5px 0 20px; color: var(--text-dark); }
        .toggle-methods { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .btn-toggle { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--border-light); color: var(--text-gray); font-size: 1.3rem; background: var(--surface-white); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .btn-toggle[data-method="sms"].active { border-color: var(--brand-blue); color: var(--brand-blue); background: rgba(0, 102, 255, 0.1); }
        .btn-toggle[data-method="email"].active { border-color: var(--brand-red); color: var(--brand-red); background: rgba(239, 68, 68, 0.1); }
        .btn-toggle[data-method="whatsapp"].active { border-color: var(--brand-green); color: var(--brand-green); background: rgba(34, 197, 94, 0.1); }
        .btn-send-link { background: var(--brand-blue); color: white; border: none; padding: 12px 30px; border-radius: 50px; font-size: 1.1rem; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body data-theme="light">

    <input type="file" id="restore-file" accept=".json" style="display: none;">

    <header>
        <div class="brand"><i class="fa-solid fa-cube"></i><span>NOVA POS</span></div>
        <div class="page-indicator">
            <div class="page-dot active"></div><div class="page-dot"></div><div class="page-dot"></div><div class="page-dot"></div><div class="page-dot"></div><div class="page-dot"></div>
        </div>
        <button class="icon-btn" onclick="openModal('settings-modal')"><i class="fa-solid fa-gear"></i></button>
    </header>

    <div class="swipe-container" id="swipe-container">

        <div class="screen screen-0">
            <div class="terminal-screen">
                <div class="total-label">À ENCAISSER</div>
                <div class="total-display" id="cart-total">0.00 €</div>
                <div class="input-box" id="barcode-display">Saisie...</div>
                <div class="cart-list-blue" id="cart-list"></div>
            </div>
            
            <div class="bottom-actions">
                <div class="numpad-grid">
                    <button class="num-btn" onclick="typeNum('7')">7</button><button class="num-btn" onclick="typeNum('8')">8</button><button class="num-btn" onclick="typeNum('9')">9</button>
                    <button class="num-btn" onclick="typeNum('4')">4</button><button class="num-btn" onclick="typeNum('5')">5</button><button class="num-btn" onclick="typeNum('6')">6</button>
                    <button class="num-btn" onclick="typeNum('1')">1</button><button class="num-btn" onclick="typeNum('2')">2</button><button class="num-btn" onclick="typeNum('3')">3</button>
                    <button class="num-btn" onclick="backspaceNum()"><i class="fa-solid fa-delete-left" style="color:var(--brand-red);"></i></button>
                    <button class="num-btn" onclick="typeNum('0')">0</button>
                    <button class="num-btn btn-enter" onclick="submitBarcode()"><i class="fa-solid fa-plus"></i></button>
                </div>
                
                <div class="action-row">
                    <button class="btn btn-secondary" onclick="openPaymentLink()"><i class="fa-solid fa-link" style="color:var(--brand-blue);"></i> Demande</button>
                    <button class="btn btn-primary" onclick="processCheckout()"><i class="fa-solid fa-cash-register"></i> ENCAISSER</button>
                </div>
            </div>
        </div>

        <div class="screen screen-1">
            <div class="terminal-screen"><div class="total-label">REMISE</div><div class="total-display" id="discount-total">0.00 €</div></div>
            <div class="scrollable-content">
                <div class="form-group"><label>Montant de la remise</label><input id="discount-amount" type="number" class="form-control" placeholder="Ex: 5.00"></div>
                <div style="display:grid; grid-template-columns: repeat(3,1fr); gap:10px; margin-bottom:15px;">
                    <button class="btn btn-secondary" style="margin:0;" onclick="setDiscountCalc(5)">-5%</button>
                    <button class="btn btn-secondary" style="margin:0;" onclick="setDiscountCalc(10)">-10%</button>
                    <button class="btn btn-secondary" style="margin:0;" onclick="setDiscountCalc(20)">-20%</button>
                </div>
                <div class="form-group"><label>Raison (Optionnel)</label><input id="discount-comment" class="form-control" placeholder="Geste commercial..."></div>
            </div>
            <button class="btn btn-primary mt-auto" style="background:var(--brand-yellow); color:#111827;" onclick="applyDiscount()">APPLIQUER LA REMISE</button>
        </div>

        <div class="screen screen-2">
            <div class="terminal-screen"><div class="total-label">ÉCHELONNÉ</div><div class="total-display" id="split-total">0.00 €</div></div>
            <div class="scrollable-content">
                <div class="form-group"><label>Nom du Client</label><input id="client-name" class="form-control" placeholder="Nom Prénom"></div>
                <div class="form-group"><label>Nombre d'échéances</label><input id="split-count" type="number" value="3" class="form-control"></div>
            </div>
            <button class="btn btn-primary mt-auto" style="background:var(--brand-green);" onclick="createSplitPayment()">CRÉER L'ÉCHÉANCIER</button>
        </div>

        <div class="screen screen-3">
            <div class="terminal-screen"><div class="total-label">INVENTAIRE</div><div class="total-display" style="font-size:1.8rem"><span id="product-count">0</span> Réf.</div></div>
            <div id="products-list" class="scrollable-content"></div>
            <button class="btn btn-secondary mt-auto" onclick="openAddProductModal()">+ Créer un Produit</button>
        </div>

        <div class="screen screen-4">
            <div class="terminal-screen"><div class="total-label">SCANNEUR</div><div class="total-display" style="font-size:1.5rem">Caméra</div></div>
            <div class="scrollable-content">
                <div id="reader"></div>
            </div>
            <div class="action-row mt-auto">
                <button class="btn btn-secondary" onclick="stopScanner()">Arrêter</button>
                <button class="btn btn-primary" style="background:var(--brand-purple);" onclick="startScanner()"><i class="fa-solid fa-qrcode"></i> DÉMARRER</button>
            </div>
        </div>

        <div class="screen screen-5">
            <div class="terminal-screen"><div class="total-label">RECETTES DU JOUR</div><div class="total-display" id="history-total">0.00 €</div></div>
            <div id="history-list" class="scrollable-content"></div>
            <button class="btn btn-primary mt-auto" style="background:var(--brand-pink);" onclick="openSettlementModal()"><i class="fa-solid fa-file-invoice"></i> CLÔTURE (SETTLEMENT)</button>
        </div>
    </div>

    <div class="modal-backdrop" id="payment-link-modal">
        <div class="modal-content" style="text-align: center;">
            <div class="modal-header">
                <span>Demande de Paiement</span>
                <i class="fa-solid fa-xmark" style="cursor:pointer; color:var(--text-gray);" onclick="closeModal('payment-link-modal')"></i>
            </div>
            <div class="payment-link-card">
                <div style="font-weight: 600; font-size: 0.9rem; color:var(--text-gray);">MONTANT</div>
                <div class="payment-link-amount" id="link-amount-display">0.00 €</div>
                <div class="toggle-methods">
                    <button class="btn-toggle active" data-method="sms" onclick="setLinkMethod('sms')"><i class="fa-solid fa-comment-sms"></i></button>
                    <button class="btn-toggle" data-method="email" onclick="setLinkMethod('email')"><i class="fa-solid fa-envelope"></i></button>
                    <button class="btn-toggle" data-method="whatsapp" onclick="setLinkMethod('whatsapp')"><i class="fa-brands fa-whatsapp"></i></button>
                </div>
                <div class="form-group" id="contact-input-group">
                    <input id="payment-contact" class="form-control" placeholder="Numéro ou Email..." style="text-align:center;">
                </div>
                <button class="btn-send-link" onclick="sendPaymentLink()"><i class="fa-regular fa-paper-plane"></i> ENVOYER</button>
            </div>
        </div>
    </div>

    <div class="modal-backdrop" id="add-product-modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Fiche Produit</span>
                <i class="fa-solid fa-xmark" onclick="closeModal('add-product-modal')"></i>
            </div>
            <div class="form-group"><label>Code Barre</label><input id="prod-barcode" class="form-control" placeholder="Ex: 123456789"></div>
            <div class="form-group"><label>Nom du Produit</label><input id="prod-name" class="form-control"></div>
            <div class="form-group"><label>Description / Détails</label><input id="prod-details" class="form-control" placeholder="Couleur, taille, info..."></div>
            <div class="action-row">
                <div class="form-group" style="flex:1;"><label>Prix Unitaire</label><input id="prod-price" type="number" step="0.01" class="form-control"></div>
                <div class="form-group" style="flex:1;"><label>Stock Initial</label><input id="prod-stock" type="number" value="10" class="form-control"></div>
            </div>
            <button class="btn btn-primary" onclick="saveProduct()">Enregistrer</button>
        </div>
    </div>

    <div class="modal-backdrop" id="settings-modal"><div class="modal-content"><div class="modal-header"><span>Paramètres</span><i class="fa-solid fa-xmark" onclick="closeModal('settings-modal')"></i></div>
        <div class="form-group"><label>Thème</label><select id="theme-select" class="form-control"><option value="light">Clair</option><option value="dark">Sombre</option></select></div>
        <div class="form-group"><label>Devise</label><select id="comp-currency" class="form-control"></select></div>
        <button class="btn btn-primary" style="margin-bottom:20px;" onclick="saveSettings()">Sauvegarder Apparence</button>
        <p style="font-size:0.8rem; color:var(--text-gray); margin-bottom:10px; font-weight:bold;">SAUVEGARDE & RESTAURATION</p>
        <button class="btn btn-secondary" onclick="backupData()"><i class="fa-solid fa-download"></i> Backup vers Téléphone</button>
        <button class="btn btn-secondary" onclick="triggerRestore()"><i class="fa-solid fa-upload"></i> Restaurer Backup</button>
    </div></div>

    <div class="modal-backdrop" id="settlement-modal"><div class="modal-content"><div class="modal-header"><span>Rapport de Caisse</span><i class="fa-solid fa-xmark" onclick="closeModal('settlement-modal')"></i></div>
        <div id="settlement-report" style="background:white; color:black; padding:15px; border-radius:8px; font-family:monospace; font-size:0.85rem; margin-bottom:15px; border:1px dashed #CCC;"></div>
        <div class="action-row">
            <button class="btn btn-secondary" style="color:var(--brand-blue);" onclick="downloadPDF()"><i class="fa-solid fa-file-pdf"></i> PDF</button>
            <button class="btn btn-secondary" style="color:var(--brand-green);" onclick="sendSettlementEmail()"><i class="fa-regular fa-envelope"></i> Mail</button>
        </div>
        <button class="btn btn-primary" style="background:var(--brand-red);" onclick="closeDay()"><i class="fa-solid fa-power-off"></i> CLÔTURER CAISSE</button>
    </div></div>

    <div class="modal-backdrop" id="admin-modal"><div class="modal-content"><div class="modal-header"><span>Sécurité</span><i class="fa-solid fa-xmark" onclick="closeModal('admin-modal')"></i></div>
        <div class="form-group"><label>Code Admin</label><input id="admin-code" type="password" class="form-control"></div>
        <button class="btn btn-primary" onclick="checkAdminCode()">Valider</button>
    </div></div>

    <div class="modal-backdrop" id="product-options-modal"><div class="modal-content"><div class="modal-header"><span>Action</span><i class="fa-solid fa-xmark" onclick="closeModal('product-options-modal')"></i></div>
        <button class="btn btn-primary" onclick="addProductToCartFromList()">Ajouter au Panier</button>
        <button class="btn btn-secondary" onclick="editProductFromOptions()">Modifier la fiche</button>
        <button class="btn btn-secondary" style="color:var(--brand-red);" onclick="deleteProductFromOptions()">Supprimer du catalogue</button>
    </div></div>

    <script>
        const ADMIN_CODE = "0000"; 
        let currentScreen = 0; let startX = 0; let selectedProductCode = null;
        let html5QrcodeScanner = null;
        
        // Base de données
        let cart = []; // Mémorise: {code, name, price, qty}
        let salesHistory = JSON.parse(localStorage.getItem('novaultra_sales')) || [];
        let dbProducts = JSON.parse(localStorage.getItem('novaultra_products')) || {
            '1111':{name:'Service A', price:'15.00', stock: 100, details: 'Base'}, 
            '2222':{name:'Produit B', price:'25.00', stock: 5, details: 'Premium'}
        };
        let companySettings = JSON.parse(localStorage.getItem('novaultra_settings')) || {currency:"EUR", theme:"light"};
        const CURRENCIES = {"EUR":"€","USD":"$","GBP":"£","MAD":"DH","CHF":"CHF"};
        let currentLinkMethod = 'sms';

        // SWIPE LOGIC
        document.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.addEventListener('touchend', e => {
            let endX = e.changedTouches[0].clientX;
            if(e.target.closest('.modal-backdrop') || e.target.closest('.scrollable-content') || e.target.closest('.cart-list-blue')) return;
            if(startX - endX > 50 && currentScreen < 5) currentScreen++;
            if(endX - startX > 50 && currentScreen > 0) currentScreen--;
            updateScreen();
        });

        function updateScreen(){
            document.getElementById('swipe-container').style.transform = `translateX(-${currentScreen * 16.666}%)`;
            const colors = ['#0066FF','#FBBF24','#22C55E','#EF4444','#A855F7','#EC4899'];
            document.querySelectorAll('.page-dot').forEach((d,i)=>{
                d.classList.toggle('active', i===currentScreen); 
                d.style.background = i===currentScreen ? colors[i] : 'var(--border-light)';
            });
            updateTotalsAcrossScreens();
            if(currentScreen === 3) loadProductsList();
            if(currentScreen === 5) loadHistory();
        }

        // --- GESTION PANIER AVEC QUANTITÉS ---
        let currentInput = "";
        function typeNum(num) { currentInput += num; document.getElementById('barcode-display').innerText = currentInput; }
        function backspaceNum() { currentInput = currentInput.slice(0, -1); document.getElementById('barcode-display').innerText = currentInput || "Saisie..."; }
        
        function addToCartLogic(code, productObj) {
            if(productObj.stock !== undefined && productObj.stock <= 0) return alert("Rupture de stock pour ce produit !");
            
            let existing = cart.find(i => i.code === code);
            if(existing) {
                if(productObj.stock !== undefined && existing.qty >= productObj.stock) {
                    return alert("Stock maximum atteint pour ce produit !");
                }
                existing.qty++;
            } else {
                cart.push({...productObj, code: code, qty: 1});
            }
            renderCart(); updateTotalsAcrossScreens();
        }

        function submitBarcode() { 
            if(currentInput === "") return;
            const p = dbProducts[currentInput]; 
            
            if(p){ 
                addToCartLogic(currentInput, p);
            } else { 
                // Code inconnu -> On propose de l'ajouter
                let choice = confirm("Code inconnu. Voulez-vous créer ce produit ?\n(Annuler pour utiliser comme montant libre)");
                if(choice) {
                    openAddProductModal(currentInput);
                } else {
                    cart.push({code: 'MANUAL', name:"Saisie Libre", price: parseFloat(currentInput).toFixed(2), qty: 1});
                    renderCart(); updateTotalsAcrossScreens();
                }
            } 
            currentInput=""; document.getElementById('barcode-display').innerText="Saisie..."; 
        }

        function getCartTotal() { return cart.reduce((s,i)=>s+(parseFloat(i.price)*i.qty),0); }

        function updateTotalsAcrossScreens() {
            let total = getCartTotal();
            if(total === 0 && currentInput !== "") total = parseFloat(currentInput);
            let displayStr = total.toFixed(2) + " " + CURRENCIES[companySettings.currency];
            document.getElementById('cart-total').innerText = displayStr;
            document.getElementById('discount-total').innerText = displayStr;
            document.getElementById('split-total').innerText = displayStr;
        }

        function renderCart(){
            const list = document.getElementById('cart-list'); list.innerHTML = "";
            if(cart.length === 0) {
                list.innerHTML = `<div style="text-align:center; color:rgba(255,255,255,0.6); padding:10px; font-size:0.85rem;">Panier vide</div>`; return;
            }
            cart.forEach((item, i)=> {
                let qtyBadge = item.qty > 1 ? `<span class="cart-qty-badge">x${item.qty}</span>` : '';
                list.innerHTML += `
                    <div class="cart-item-blue">
                        <span>${qtyBadge}${item.name}</span>
                        <span>${(parseFloat(item.price)*item.qty).toFixed(2)} ${CURRENCIES[companySettings.currency]} 
                            <i class="fa-solid fa-minus" onclick="decreaseFromCart(${i})"></i>
                        </span>
                    </div>`;
            });
            list.scrollTop = list.scrollHeight;
        }

        function decreaseFromCart(i){ 
            if(cart[i].qty > 1) { cart[i].qty--; } else { cart.splice(i,1); }
            renderCart(); updateTotalsAcrossScreens();
        }

        function processCheckout() {
            if(cart.length === 0 && currentInput === "") return alert("Le panier est vide.");
            let total = getCartTotal();
            
            if(total === 0 && currentInput !== "") { 
                total = parseFloat(currentInput); 
                cart.push({code: 'MANUAL', name:"Saisie Rapide", price: total, qty:1}); 
            }
            
            // Déduction des stocks
            cart.forEach(item => {
                if(item.code && dbProducts[item.code] && dbProducts[item.code].stock !== undefined) {
                    dbProducts[item.code].stock -= item.qty;
                }
            });
            localStorage.setItem('novaultra_products', JSON.stringify(dbProducts));

            salesHistory.push({total: total, items: cart, date: new Date().toISOString()}); 
            localStorage.setItem('novaultra_sales', JSON.stringify(salesHistory)); 
            cart=[]; currentInput=""; document.getElementById('barcode-display').innerText="Saisie...";
            renderCart(); updateTotalsAcrossScreens();
            alert("Encaissé ! Stock mis à jour.");
        }

        // --- LIEN DE PAIEMENT ---
        function openPaymentLink() {
            let total = getCartTotal();
            if(total === 0 && currentInput !== "") total = parseFloat(currentInput);
            if(total === 0 || isNaN(total)) return alert("Saisissez un montant avant de demander un paiement.");
            document.getElementById('link-amount-display').innerText = total.toFixed(2) + " " + CURRENCIES[companySettings.currency];
            document.getElementById('payment-contact').value = ""; setLinkMethod('sms'); openModal('payment-link-modal');
        }

        function setLinkMethod(method) {
            currentLinkMethod = method;
            document.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
            document.querySelector(`.btn-toggle[data-method="${method}"]`).classList.add('active');
            const input = document.getElementById('payment-contact');
            if(method === 'email') { input.placeholder = "Adresse email du client..."; input.type = "email"; }
            else { input.placeholder = "Numéro de téléphone..."; input.type = "tel"; }
        }

        function sendPaymentLink() {
            const contact = document.getElementById('payment-contact').value;
            let total = getCartTotal();
            if(total === 0 && currentInput !== "") total = parseFloat(currentInput);
            let message = `Demande de paiement de ${total.toFixed(2)}${CURRENCIES[companySettings.currency]}. Lien: https://pay.novapos.link/m`;
            
            if(currentLinkMethod === 'whatsapp') { window.open(`https://wa.me/${contact.replace(/\s+/g,'')}?text=${encodeURIComponent(message)}`, '_blank'); } 
            else if (currentLinkMethod === 'sms') { window.open(`sms:${contact}?body=${encodeURIComponent(message)}`, '_self'); } 
            else { window.open(`mailto:${contact}?subject=Demande de Paiement&body=${encodeURIComponent(message)}`, '_self'); }
            
            closeModal('payment-link-modal'); cart = []; currentInput = ""; document.getElementById('barcode-display').innerText="Saisie...";
            renderCart(); updateTotalsAcrossScreens();
        }

        // --- REMISE ---
        function setDiscountCalc(percent) {
            let total = getCartTotal();
            if(total === 0 && currentInput !== "") total = parseFloat(currentInput);
            document.getElementById('discount-amount').value = (total * (percent / 100)).toFixed(2);
        }
        function applyDiscount() {
            let val = parseFloat(document.getElementById('discount-amount').value);
            let comment = document.getElementById('discount-comment').value || "Remise";
            if(val > 0) {
                cart.push({code: 'DISCOUNT', name: `Remise (${comment})`, price: -val, qty:1});
                renderCart(); document.getElementById('discount-amount').value = ""; document.getElementById('discount-comment').value = "";
                currentScreen = 0; updateScreen();
            }
        }

        // --- ÉCHELONNÉ ---
        function createSplitPayment() {
            let total = getCartTotal();
            if(total === 0 && currentInput !== "") total = parseFloat(currentInput);
            if(total === 0) return alert("Montant invalide.");
            let months = parseInt(document.getElementById('split-count').value);
            let name = document.getElementById('client-name').value || "Client";
            let part = total / months;
            alert(`Échéancier généré pour ${name}.\nLa première échéance (${part.toFixed(2)}) est ajoutée au panier.`);
            cart = []; cart.push({code: 'SPLIT', name: `1ère Échéance - ${name}`, price: part.toFixed(2), qty:1});
            renderCart(); document.getElementById('client-name').value = ""; currentScreen = 0; updateScreen();
        }

        // --- INVENTAIRE ---
        function loadProductsList(){
            const list = document.getElementById('products-list'); list.innerHTML = "";
            document.getElementById('product-count').innerText = Object.keys(dbProducts).length;
            for(const [code, p] of Object.entries(dbProducts)){
                let stockClass = (p.stock <= 5) ? 'stock-low' : '';
                list.innerHTML += `<div class="product-list-item" onclick="openProductOptions('${code}')">
                    <div>
                        <strong style="color:var(--text-dark)">${p.name}</strong> <span class="stock-badge ${stockClass}">Stock: ${p.stock || 0}</span><br>
                        <small style="color:var(--text-gray);">#${code} ${p.details ? '• '+p.details : ''}</small>
                    </div>
                    <div style="font-weight:bold; color:var(--text-dark)">${parseFloat(p.price).toFixed(2)} ${CURRENCIES[companySettings.currency]} <i class="fa-solid fa-ellipsis-vertical dots-menu"></i></div>
                </div>`;
            }
        }
        function openProductOptions(code){ selectedProductCode = code; openModal('product-options-modal'); }
        
        function addProductToCartFromList() {
            const p = dbProducts[selectedProductCode];
            addToCartLogic(selectedProductCode, p);
            closeModal('product-options-modal'); currentScreen = 0; updateScreen(); 
        }

        function editProductFromOptions(){ 
            document.getElementById('prod-barcode').value=selectedProductCode; 
            document.getElementById('prod-name').value=dbProducts[selectedProductCode].name; 
            document.getElementById('prod-price').value=dbProducts[selectedProductCode].price; 
            document.getElementById('prod-stock').value=dbProducts[selectedProductCode].stock || 0; 
            document.getElementById('prod-details').value=dbProducts[selectedProductCode].details || ''; 
            closeModal('product-options-modal'); openModal('add-product-modal'); 
        }
        function deleteProductFromOptions(){ closeModal('product-options-modal'); openModal('admin-modal'); }
        
        function checkAdminCode(){
            if(document.getElementById('admin-code').value === ADMIN_CODE){
                delete dbProducts[selectedProductCode]; localStorage.setItem('novaultra_products',JSON.stringify(dbProducts)); loadProductsList(); closeModal('admin-modal'); 
            } else alert("Code PIN incorrect.");
            document.getElementById('admin-code').value = "";
        }

        function openAddProductModal(code = ""){
            document.getElementById('prod-barcode').value = code; document.getElementById('prod-name').value = ''; 
            document.getElementById('prod-price').value = ''; document.getElementById('prod-stock').value = '10'; 
            document.getElementById('prod-details').value = ''; openModal('add-product-modal');
        }

        function saveProduct(){
            let c=document.getElementById('prod-barcode').value, n=document.getElementById('prod-name').value, 
                p=document.getElementById('prod-price').value, s=document.getElementById('prod-stock').value, 
                d=document.getElementById('prod-details').value; 
            if(!c) c = "SKU" + Math.floor(Math.random()*10000); 
            if(n && p){ 
                dbProducts[c]={name:n, price:p, stock:parseInt(s)||0, details:d}; 
                localStorage.setItem('novaultra_products',JSON.stringify(dbProducts)); 
                closeModal('add-product-modal'); loadProductsList(); 
                // Si on vient d'un code inconnu scanné, on l'ajoute au panier direct
                if(currentInput !== "" && currentInput === c) {
                    addToCartLogic(c, dbProducts[c]); currentInput = ""; document.getElementById('barcode-display').innerText="Saisie..."; currentScreen = 0; updateScreen();
                }
            } else alert("Nom et prix requis.");
        }

        // --- SCANNER CAMERA ---
        function startScanner() {
            if(html5QrcodeScanner == null) html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start(
                { facingMode: "environment" }, { fps: 10, qrbox: {width: 250, height: 250} },
                (decodedText) => {
                    if(window.navigator && window.navigator.vibrate) navigator.vibrate(100);
                    if(dbProducts[decodedText]) {
                        addToCartLogic(decodedText, dbProducts[decodedText]);
                        stopScanner(); currentScreen = 0; updateScreen();
                    } else {
                        stopScanner();
                        openAddProductModal(decodedText);
                    }
                },
                (err) => {}
            ).catch(err => alert("Erreur d'accès à la caméra."));
        }
        function stopScanner() { if(html5QrcodeScanner) html5QrcodeScanner.stop().catch(err => console.log(err)); }

        // --- SETTLEMENT & PDF ---
        function loadHistory(){
            let total = salesHistory.reduce((s,i)=>s+i.total,0);
            document.getElementById('history-total').innerText = total.toFixed(2)+" "+CURRENCIES[companySettings.currency];
            const list = document.getElementById('history-list'); list.innerHTML = "";
            salesHistory.slice().reverse().forEach(s=> {
                let d = new Date(s.date);
                list.innerHTML += `<div class="product-list-item"><span>${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span><span style="font-weight:bold; color:var(--text-dark);">${s.total.toFixed(2)} ${CURRENCIES[companySettings.currency]}</span></div>`;
            });
        }

        function buildSettlementHTML() {
            let total = salesHistory.reduce((s,i)=>s+i.total,0);
            return `
                <div style="text-align:center; font-weight:bold; font-size:1.2rem; margin-bottom:10px;">NOVA POS - RAPPORT Z</div>
                <div>Date : ${new Date().toLocaleDateString()}</div>
                <div>Heure : ${new Date().toLocaleTimeString()}</div>
                <hr style="border:1px dashed #333; margin:10px 0;">
                <div>Nombre de Transactions : ${salesHistory.length}</div>
                <div style="font-size:1.1rem; font-weight:bold; margin-top:10px;">CA TOTAL : ${total.toFixed(2)} ${CURRENCIES[companySettings.currency]}</div>
                <hr style="border:1px dashed #333; margin:10px 0;">
                <div style="text-align:center; font-size:0.8rem;">Généré par NovaPOS Ultra</div>
            `;
        }

        function openSettlementModal(){
            document.getElementById('settlement-report').innerHTML = buildSettlementHTML();
            openModal('settlement-modal');
        }

        function downloadPDF() {
            const element = document.getElementById('settlement-report');
            let opt = { margin: 10, filename: 'Rapport_Z_NovaPOS.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a5', orientation: 'portrait' } };
            html2pdf().set(opt).from(element).save();
        }

        function sendSettlementEmail() {
            let total = salesHistory.reduce((s,i)=>s+i.total,0);
            let body = `Rapport Z%0A%0ADate: ${new Date().toLocaleDateString()}%0ATransactions: ${salesHistory.length}%0ACA Total: ${total.toFixed(2)} ${companySettings.currency}%0A%0AEnvoyé depuis NovaPOS`;
            window.open(`mailto:?subject=Rapport de Caisse&body=${body}`);
        }

        function closeDay(){ 
            if(confirm("Attention : L'historique va être remis à zéro. Confirmer ?")){ 
                salesHistory=[]; localStorage.setItem('novaultra_sales', JSON.stringify(salesHistory)); alert("Caisse clôturée."); closeModal('settlement-modal'); loadHistory(); 
            } 
        }

        // --- BACKUP / RESTORE ---
        function backupData(){ 
            const dataObj = { products: dbProducts, sales: salesHistory, settings: companySettings };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dataObj));
            const downloadAnchorNode = document.createElement('a'); downloadAnchorNode.setAttribute("href", dataStr); downloadAnchorNode.setAttribute("download", "NovaPOS_Backup_" + new Date().toISOString().split('T')[0] + ".json");
            document.body.appendChild(downloadAnchorNode); downloadAnchorNode.click(); downloadAnchorNode.remove();
        }
        function triggerRestore() { document.getElementById('restore-file').click(); }
        document.getElementById('restore-file').addEventListener('change', function(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if(data.products) {
                        dbProducts = data.products; localStorage.setItem('novaultra_products', JSON.stringify(dbProducts));
                        salesHistory = data.sales || []; localStorage.setItem('novaultra_sales', JSON.stringify(salesHistory));
                        if(data.settings) { companySettings = data.settings; localStorage.setItem('novaultra_settings', JSON.stringify(companySettings)); }
                        alert("Restauration réussie !"); location.reload();
                    } else alert("Fichier invalide.");
                } catch(err) { alert("Erreur de lecture du fichier."); }
            };
            reader.readAsText(file);
        });

        // UTILITAIRES
        function openModal(id){document.getElementById(id).classList.add('active')}
        function closeModal(id){document.getElementById(id).classList.remove('active')}
        function saveSettings(){ 
            companySettings.currency = document.getElementById('comp-currency').value; 
            companySettings.theme = document.getElementById('theme-select').value;
            document.body.dataset.theme = companySettings.theme;
            localStorage.setItem('novaultra_settings', JSON.stringify(companySettings)); 
            closeModal('settings-modal'); renderCart(); loadProductsList(); updateTotalsAcrossScreens();
        }

        // INIT
        for(const [code, sym] of Object.entries(CURRENCIES)) document.getElementById('comp-currency').innerHTML += `<option value="${code}">${code} (${sym})</option>`;
        document.getElementById('comp-currency').value = companySettings.currency;
        document.getElementById('theme-select').value = companySettings.theme;
        document.body.dataset.theme = companySettings.theme;
        
        renderCart(); updateScreen();
    </script>
</body>
</html>
